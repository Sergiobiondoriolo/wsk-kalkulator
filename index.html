// TAB: AKTIVITÄTSLOG
// ═══════════════════════════════════════════════════════════
function LogTab({ logs, setLogs, appPassword }) {
  const [filterAction, setFilterAction] = useState("");
  const [showClearConfirm, setShowClearConfirm] = useState(false);
  const [clearPw, setClearPw] = useState("");
  const [clearPwError, setClearPwError] = useState(false);

  const handleClearLogs = () => {
    if (clearPw === appPassword) {
      setLogs([]);
      setShowClearConfirm(false);
      setClearPw("");
      setClearPwError(false);
    } else {
      setClearPwError(true);
    }
  };

  const actionTypes = [...new Set(logs.map((l) => l.action))];
  
  const actionColors = {
    "Import": theme.accent,
    "Hinzugefügt": theme.green,
    "Bearbeitet": theme.yellow,
    "Papierkorb": theme.orange,
    "Wiederhergestellt": "#06B6D4",
    "Endgültig gelöscht": theme.red,
    "Papierkorb geleert": theme.red,
    "Zuordnung": "#A855F7",
  };

  const filtered = filterAction ? logs.filter((l) => l.action === filterAction) : logs;

  const formatDate = (iso) => {
    const d = new Date(iso);
    const today = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    
    const isToday = d.toDateString() === today.toDateString();
    const isYesterday = d.toDateString() === yesterday.toDateString();
    
    const time = d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    if (isToday) return `Heute, ${time}`;
    if (isYesterday) return `Gestern, ${time}`;
    return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" }) + `, ${time}`;
  };

  // Group by date
  const grouped = {};
  filtered.forEach((log) => {
    const date = new Date(log.timestamp).toLocaleDateString("de-DE", { weekday: "long", day: "2-digit", month: "long", year: "numeric" });
    if (!grouped[date]) grouped[date] = [];
    grouped[date].push(log);
  });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 15, fontWeight: 600 }}>Aktivitätslog</div>
          <div style={{ fontSize: 13, color: theme.textMuted, marginTop: 2 }}>
            Alle Änderungen an Produkten werden hier protokolliert.
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {actionTypes.length > 1 && (
            <select style={{ ...css.select, width: "auto", minWidth: 140, padding: "6px 10px", fontSize: 12 }} value={filterAction} onChange={(e) => setFilterAction(e.target.value)}>
              <option value="">Alle Aktionen ({logs.length})</option>
              {actionTypes.map((a) => (
                <option key={a} value={a}>{a} ({logs.filter((l) => l.action === a).length})</option>
              ))}
            </select>
          )}
          {logs.length > 0 && !showClearConfirm && (
            <button style={{ ...css.btn("ghost"), fontSize: 12, color: theme.red, borderColor: theme.red + "33" }} onClick={() => setShowClearConfirm(true)}>
              <Icon type="trash" size={13} /> Log leeren
            </button>
          )}
        </div>
      </div>

      {/* Password-protected clear */}
      {showClearConfirm && (
        <div style={{
          ...css.card, marginBottom: 16,
          background: theme.redGlow,
          border: `1px solid ${theme.red}33`,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
            <div style={{ flex: "1 1 auto" }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: theme.red, marginBottom: 4 }}>
                Log leeren — Passwort erforderlich
              </div>
              <div style={{ fontSize: 12, color: theme.textMuted }}>
                Gib das Passwort ein, um alle {logs.length} Log-Einträge endgültig zu löschen.
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <div style={{ position: "relative" }}>
                <input
                  type="password"
                  style={{
                    ...css.input, width: 120, padding: "7px 12px",
                    fontFamily: theme.fontMono, textAlign: "center", letterSpacing: "0.15em",
                    borderColor: clearPwError ? theme.red : theme.border,
                  }}
                  placeholder="•••"
                  value={clearPw}
                  onChange={(e) => { setClearPw(e.target.value); setClearPwError(false); }}
                  onKeyDown={(e) => e.key === "Enter" && handleClearLogs()}
                  autoFocus
                />
                {clearPwError && (
                  <div style={{ fontSize: 11, color: theme.red, position: "absolute", top: "100%", left: 0, marginTop: 2, whiteSpace: "nowrap" }}>
                    Falsches Passwort
                  </div>
                )}
              </div>
              <button style={{ ...css.btn("danger"), padding: "7px 14px" }} onClick={handleClearLogs}>
                <Icon type="check" size={13} /> Bestätigen
              </button>
              <button style={{ ...css.btn("ghost"), padding: "7px 10px" }} onClick={() => { setShowClearConfirm(false); setClearPw(""); setClearPwError(false); }}>
                Abbrechen
              </button>
            </div>
          </div>
        </div>
      )}

      {Object.keys(grouped).length > 0 ? (
        Object.entries(grouped).map(([date, entries]) => (
          <div key={date} style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8, paddingLeft: 4 }}>
              {date}
            </div>
            <div style={{ ...css.card, padding: 0, overflow: "hidden" }}>
              {entries.map((log, i) => (
                <div key={log.id} style={{
                  padding: "12px 16px",
                  borderBottom: i < entries.length - 1 ? `1px solid ${theme.border}` : "none",
                  display: "flex", alignItems: "center", gap: 12,
                }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: 4, flexShrink: 0,
                    background: actionColors[log.action] || theme.textMuted,
                  }} />
                  <span style={css.badge(actionColors[log.action] || theme.textMuted)}>
                    {log.action}
                  </span>
                  <span style={{ fontSize: 13, flex: 1 }}>{log.details}</span>
                  <span style={{ fontSize: 11, color: theme.textDim, whiteSpace: "nowrap" }}>
                    {formatDate(log.timestamp)}
                  </span>
                </div>
              ))}
            </div>
          </div>
        ))
      ) : (
        <div style={{ ...css.card, ...css.emptyState }}>
          <Icon type="list" size={32} />
          <div style={{ marginTop: 12, fontSize: 15, fontWeight: 500 }}>Noch keine Aktivitäten</div>
          <div style={{ fontSize: 13, marginTop: 4, color: theme.textDim }}>Änderungen an Produkten werden hier automatisch protokolliert.</div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TAB: ADMIN
// ═══════════════════════════════════════════════════════════
function AdminTab({ appPassword, setAppPassword, products, setProducts, suppliers, setSuppliers, marketplaces, setMarketplaces, shippingOptions, setShippingOptions, packagingOptions, setPackagingOptions, trash, setTrash, logs, setLogs, addLog }) {
  // Password change
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [pwMsg, setPwMsg] = useState(null); // { type: 'success'|'error', text }
  const [showCurrentPw, setShowCurrentPw] = useState(false);
  const [showNewPw, setShowNewPw] = useState(false);

  // Data management
  const [confirmReset, setConfirmReset] = useState(false);
  const [resetPw, setResetPw] = useState("");
  const [resetPwError, setResetPwError] = useState(false);
  const [backupMsg, setBackupMsg] = useState(null);

  // Backup: export all data as JSON file
  const handleBackup = () => {
    const data = { version: 2, date: new Date().toISOString(), products, suppliers, marketplaces, shippingOptions, packagingOptions, trash, logs };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const d = new Date();
    a.href = url;
    a.download = `preiskalkulator-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setBackupMsg({ type: "success", text: "Backup heruntergeladen!" });
    setTimeout(() => setBackupMsg(null), 3000);
  };

  // Restore: import JSON backup
  const handleRestore = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.products && !data.suppliers) throw new Error("Keine gueltige Backup-Datei");
          if (data.products) setProducts(data.products);
          if (data.suppliers) setSuppliers(data.suppliers);
          if (data.marketplaces) setMarketplaces(data.marketplaces);
          if (data.shippingOptions) setShippingOptions(data.shippingOptions);
          if (data.packagingOptions) setPackagingOptions(data.packagingOptions);
          if (data.trash) setTrash(data.trash);
          if (data.logs) setLogs(data.logs);
          setBackupMsg({ type: "success", text: `Backup vom ${new Date(data.date).toLocaleDateString("de-DE")} wiederhergestellt! (${(data.products||[]).length} Produkte, ${(data.suppliers||[]).length} Preislisten)` });
          addLog("Backup wiederhergestellt", `Datum: ${data.date}`);
        } catch (err) {
          setBackupMsg({ type: "error", text: "Fehler: " + err.message });
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const handlePasswordChange = () => {
    if (!currentPw || !newPw || !confirmPw) {
      setPwMsg({ type: "error", text: "Bitte alle Felder ausfüllen." });
      return;
    }
    if (currentPw !== appPassword) {
      setPwMsg({ type: "error", text: "Aktuelles Passwort ist falsch." });
      return;
    }
    if (newPw.length < 2) {
      setPwMsg({ type: "error", text: "Neues Passwort muss mindestens 2 Zeichen lang sein." });
      return;
    }
    if (newPw !== confirmPw) {
      setPwMsg({ type: "error", text: "Neue Passwörter stimmen nicht überein." });
      return;
    }
    if (newPw === currentPw) {
      setPwMsg({ type: "error", text: "Neues Passwort darf nicht gleich dem alten sein." });
      return;
    }
    setAppPassword(newPw);
    addLog("Admin", `Passwort wurde geändert`);
    setPwMsg({ type: "success", text: "Passwort erfolgreich geändert!" });
    setCurrentPw("");
    setNewPw("");
    setConfirmPw("");
  };

  const handleResetAll = async () => {
    if (resetPw !== appPassword) {
      setResetPwError(true);
      return;
    }
    const keys = ["pk_products", "pk_marketplaces", "pk_shipping", "pk_packaging", "pk_suppliers", "pk_trash", "pk_logs"];
    for (const key of keys) {
      try { localStorage.removeItem(key); } catch (e) {}
    }
    addLog("Admin", "Alle Daten wurden zurückgesetzt");
    setConfirmReset(false);
    setResetPw("");
    setResetPwError(false);
    // Reload to reinitialize
    localStorage.setItem("pk_gh_skip_load","1"); autoSaveToGist(); setTimeout(() => window.location.reload(), 2000);
  };

  const stats = {
    products: products.length,
    suppliers: suppliers.length,
    trash: trash.length,
    logs: logs.length,
    categories: [...new Set(products.map((p) => p.category).filter(Boolean))].length,
  };

  const PwField = ({ label, value, onChange, show, onToggle, placeholder }) => (
    <Field label={label}>
      <div style={{ position: "relative" }}>
        <input
          type={show ? "text" : "password"}
          style={{ ...css.input, paddingRight: 36, fontFamily: theme.fontMono, letterSpacing: "0.1em" }}
          value={value}
          onChange={onChange}
          placeholder={placeholder || "•••"}
        />
        <button
          type="button"
          style={{
            position: "absolute", right: 4, top: 4, padding: "4px 6px",
            background: "none", border: "none", cursor: "pointer", color: theme.textMuted,
          }}
          onClick={onToggle}
        >
          {show ? <Icon type="x" size={14} /> : <Icon type="search" size={14} />}
        </button>
      </div>
    </Field>
  );

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 15, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
          <Icon type="settings" size={18} /> Admin-Bereich
        </div>
        <div style={{ fontSize: 13, color: theme.textMuted, marginTop: 2 }}>
          Passwort ändern, Systemstatistiken und Datenmanagement.
        </div>
      </div>

      {/* Statistics */}
      <div style={css.card}>
        <div style={css.cardTitle}><Icon type="list" size={16} /> Systemübersicht</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10 }}>
          {[
            { label: "Produkte", value: stats.products, color: theme.accent },
            { label: "Preislisten", value: stats.suppliers, color: "#A855F7" },
            { label: "Kategorien", value: stats.categories, color: theme.green },
            { label: "Papierkorb", value: stats.trash, color: theme.orange },
            { label: "Log-Einträge", value: stats.logs, color: theme.yellow },
          ].map((s) => (
            <div key={s.label} style={css.resultBox(s.color, s.color + "12")}>
              <div style={{ fontSize: 28, fontWeight: 700, fontFamily: theme.fontMono, color: s.color }}>{s.value}</div>
              <div style={css.resultLabel}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Password Change */}
      <div style={css.card}>
        <div style={css.cardTitle}><Icon type="settings" size={16} /> Passwort ändern</div>

        {pwMsg && (
          <div style={{
            marginBottom: 14, padding: "10px 14px", borderRadius: theme.radiusSm,
            background: pwMsg.type === "success" ? theme.greenGlow : theme.redGlow,
            border: `1px solid ${pwMsg.type === "success" ? theme.green : theme.red}33`,
            color: pwMsg.type === "success" ? theme.green : theme.red,
            fontSize: 13, display: "flex", alignItems: "center", justifyContent: "space-between",
          }}>
            <span>{pwMsg.text}</span>
            <button style={{ background: "none", border: "none", cursor: "pointer", color: "inherit", padding: 2 }} onClick={() => setPwMsg(null)}>
              <Icon type="x" size={14} />
            </button>
          </div>
        )}

        <div style={css.grid3}>
          <PwField
            label="Aktuelles Passwort"
            value={currentPw}
            onChange={(e) => { setCurrentPw(e.target.value); setPwMsg(null); }}
            show={showCurrentPw}
            onToggle={() => setShowCurrentPw(!showCurrentPw)}
          />
          <PwField
            label="Neues Passwort"
            value={newPw}
            onChange={(e) => { setNewPw(e.target.value); setPwMsg(null); }}
            show={showNewPw}
            onToggle={() => setShowNewPw(!showNewPw)}
            placeholder="Neues Passwort"
          />
          <PwField
            label="Neues Passwort bestätigen"
            value={confirmPw}
            onChange={(e) => { setConfirmPw(e.target.value); setPwMsg(null); }}
            show={showNewPw}
            onToggle={() => setShowNewPw(!showNewPw)}
            placeholder="Wiederholen"
          />
        </div>
        <div style={{ marginTop: 14 }}>
          <button style={css.btn("primary")} onClick={handlePasswordChange}>
            <Icon type="check" size={15} /> Passwort ändern
          </button>
        </div>
      </div>

      {/* Backup & Restore */}
      <div style={css.card}>
        <div style={css.cardTitle}><Icon type="list" size={16} /> Datensicherung</div>
        <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 14 }}>
          Exportiere alle Daten als JSON-Datei auf deinen PC. Bei Cache-Löschung oder neuem Browser kannst du alles wiederherstellen.
        </div>
        {backupMsg && (
          <div style={{
            marginBottom: 14, padding: "10px 14px", borderRadius: theme.radiusSm,
            background: backupMsg.type === "success" ? theme.greenGlow : theme.redGlow,
            border: `1px solid ${backupMsg.type === "success" ? theme.green : theme.red}33`,
            color: backupMsg.type === "success" ? theme.green : theme.red, fontSize: 13,
          }}>
            {backupMsg.text}
          </div>
        )}
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <button style={css.btn("primary")} onClick={handleBackup}>
            <Icon type="check" size={15} /> Backup herunterladen
          </button>
          <button style={css.btn("ghost")} onClick={handleRestore}>
            <Icon type="list" size={15} /> Backup wiederherstellen
          </button>
        </div>
        <div style={{ fontSize: 12, color: theme.textMuted, marginTop: 10 }}>
          Enthält: {products.length} Produkte, {suppliers.length} Preislisten, {marketplaces.length} Marktplätze, Versand/Verpackung, Papierkorb ({trash.length}), Log ({logs.length})
        </div>
      </div>

      {/* Danger Zone */}
      <div style={{ ...css.card, borderColor: theme.red + "33" }}>
        <div style={{ ...css.cardTitle, color: theme.red }}><Icon type="trash" size={16} /> Gefahrenzone</div>
        <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 14 }}>
          Alle Daten zurücksetzen — Produkte, Preislisten, Marktplätze, Versandoptionen, Papierkorb und Log werden unwiderruflich gelöscht. Das Passwort wird auf den Standard „WSK" zurückgesetzt.
        </div>

        {confirmReset ? (
          <div style={{
            padding: "12px 16px", background: theme.redGlow, borderRadius: theme.radiusSm,
            border: `1px solid ${theme.red}33`, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap",
          }}>
            <span style={{ fontSize: 13, color: theme.red, fontWeight: 500 }}>Passwort eingeben zum Bestätigen:</span>
            <div style={{ position: "relative" }}>
              <input
                type="password"
                style={{
                  ...css.input, width: 120, padding: "7px 12px",
                  fontFamily: theme.fontMono, textAlign: "center", letterSpacing: "0.15em",
                  borderColor: resetPwError ? theme.red : theme.border,
                }}
                placeholder="•••"
                value={resetPw}
                onChange={(e) => { setResetPw(e.target.value); setResetPwError(false); }}
                onKeyDown={(e) => e.key === "Enter" && handleResetAll()}
                autoFocus
              />
              {resetPwError && (
                <div style={{ fontSize: 11, color: theme.red, position: "absolute", top: "100%", left: 0, marginTop: 2, whiteSpace: "nowrap" }}>
                  Falsches Passwort
                </div>
              )}
            </div>
            <button style={{ ...css.btn("danger"), padding: "7px 14px" }} onClick={handleResetAll}>
              <Icon type="check" size={13} /> Alles löschen
            </button>
            <button style={{ ...css.btn("ghost"), padding: "7px 10px" }} onClick={() => { setConfirmReset(false); setResetPw(""); setResetPwError(false); }}>
              Abbrechen
            </button>
          </div>
        ) : (
          <button style={{ ...css.btn("ghost"), color: theme.red, borderColor: theme.red + "33" }} onClick={() => setConfirmReset(true)}>
            <Icon type="trash" size={14} /> Alle Daten zurücksetzen
          </button>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TAB: VERSAND & VERPACKUNG
// ═══════════════════════════════════════════════════════════
function VersandTab({ shippingOptions, setShippingOptions, packagingOptions, setPackagingOptions }) {
  const [showShipForm, setShowShipForm] = useState(false);
  const [showPackForm, setShowPackForm] = useState(false);
  const [editShipId, setEditShipId] = useState(null);
  const [editPackId, setEditPackId] = useState(null);
  const [shipForm, setShipForm] = useState({ name: "", maxWeight: "", cost: "", dimensions: "" });
  const [packForm, setPackForm] = useState({ name: "", cost: "" });

  const saveShipping = () => {
    if (!shipForm.name || !shipForm.cost) return;
    const entry = { name: shipForm.name, maxWeight: parseFloat(shipForm.maxWeight) || 0, cost: parseFloat(shipForm.cost), dimensions: shipForm.dimensions };
    if (editShipId) {
      setShippingOptions(shippingOptions.map((s) => (s.id === editShipId ? { ...s, ...entry } : s)));
    } else {
      setShippingOptions([...shippingOptions, { id: uid(), ...entry }]);
    }
    setShowShipForm(false);
    setEditShipId(null);
    setShipForm({ name: "", maxWeight: "", cost: "", dimensions: "" });
  };

  const savePackaging = () => {
    if (!packForm.name || !packForm.cost) return;
    const entry = { name: packForm.name, cost: parseFloat(packForm.cost) };
    if (editPackId) {
      setPackagingOptions(packagingOptions.map((p) => (p.id === editPackId ? { ...p, ...entry } : p)));
    } else {
      setPackagingOptions([...packagingOptions, { id: uid(), ...entry }]);
    }
    setShowPackForm(false);
    setEditPackId(null);
    setPackForm({ name: "", cost: "" });
  };

  return (
    <div>
      {/* Shipping */}
      <div style={css.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={css.cardTitle}><Icon type="truck" size={16} /> Versandoptionen</div>
          <button style={css.btn("primary")} onClick={() => { setShipForm({ name: "", maxWeight: "", cost: "", dimensions: "" }); setEditShipId(null); setShowShipForm(true); }}>
            <Icon type="plus" size={15} /> Hinzufügen
          </button>
        </div>

        {showShipForm && (
          <div style={{ background: theme.surface, borderRadius: theme.radiusSm, padding: 16, marginBottom: 14, border: `1px solid ${theme.border}` }}>
            <div style={css.grid4}>
              <Field label="Name *">
                <input style={css.input} value={shipForm.name} onChange={(e) => setShipForm({ ...shipForm, name: e.target.value })} placeholder="z.B. DHL Paket" />
              </Field>
              <Field label="Max. Gewicht (kg)">
                <input style={{ ...css.input, fontFamily: theme.fontMono }} type="number" step="0.1" value={shipForm.maxWeight} onChange={(e) => setShipForm({ ...shipForm, maxWeight: e.target.value })} />
              </Field>
              <Field label="Kosten (€) *">
                <input style={{ ...css.input, fontFamily: theme.fontMono }} type="number" step="0.01" value={shipForm.cost} onChange={(e) => setShipForm({ ...shipForm, cost: e.target.value })} />
              </Field>
              <Field label="Maße">
                <input style={css.input} value={shipForm.dimensions} onChange={(e) => setShipForm({ ...shipForm, dimensions: e.target.value })} placeholder="z.B. 60×30×15 cm" />
              </Field>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button style={css.btn("primary")} onClick={saveShipping}><Icon type="check" size={15} /> Speichern</button>
              <button style={css.btn("ghost")} onClick={() => setShowShipForm(false)}>Abbrechen</button>
            </div>
          </div>
        )}

        <table style={css.table}>
          <thead>
            <tr>
              <th style={css.th}>Versandoption</th>
              <th style={css.th}>Maße</th>
              <th style={{ ...css.th, textAlign: "right" }}>Max. Gewicht</th>
              <th style={{ ...css.th, textAlign: "right" }}>Kosten</th>
              <th style={{ ...css.th, textAlign: "right" }}>Aktionen</th>
            </tr>
          </thead>
          <tbody>
            {shippingOptions.map((s) => (
              <tr key={s.id}>
                <td style={{ ...css.td, fontWeight: 500 }}>{s.name}</td>
                <td style={{ ...css.td, fontSize: 12, color: theme.textMuted }}>{s.dimensions || "–"}</td>
                <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono }}>{s.maxWeight} kg</td>
                <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono, fontWeight: 600 }}>{fmt(s.cost)}</td>
                <td style={{ ...css.td, textAlign: "right" }}>
                  <button style={{ ...css.btn("ghost"), padding: "4px 6px", marginRight: 4 }} onClick={() => {
                    setShipForm({ name: s.name, maxWeight: String(s.maxWeight), cost: String(s.cost), dimensions: s.dimensions || "" });
                    setEditShipId(s.id); setShowShipForm(true);
                  }}><Icon type="edit" size={13} /></button>
                  <button style={{ ...css.btn("ghost"), padding: "4px 6px", color: theme.red }} onClick={() => setShippingOptions(shippingOptions.filter((o) => o.id !== s.id))}>
                    <Icon type="trash" size={13} />
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Packaging */}
      <div style={css.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={css.cardTitle}><Icon type="box" size={16} /> Verpackungsmaterial</div>
          <button style={css.btn("primary")} onClick={() => { setPackForm({ name: "", cost: "" }); setEditPackId(null); setShowPackForm(true); }}>
            <Icon type="plus" size={15} /> Hinzufügen
          </button>
        </div>

        {showPackForm && (
          <div style={{ background: theme.surface, borderRadius: theme.radiusSm, padding: 16, marginBottom: 14, border: `1px solid ${theme.border}` }}>
            <div style={css.grid2}>
              <Field label="Name *">
                <input style={css.input} value={packForm.name} onChange={(e) => setPackForm({ ...packForm, name: e.target.value })} placeholder="z.B. Luftpolsterfolie" />
              </Field>
              <Field label="Kosten (€) *">
                <input style={{ ...css.input, fontFamily: theme.fontMono }} type="number" step="0.01" value={packForm.cost} onChange={(e) => setPackForm({ ...packForm, cost: e.target.value })} />
              </Field>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <button style={css.btn("primary")} onClick={savePackaging}><Icon type="check" size={15} /> Speichern</button>
              <button style={css.btn("ghost")} onClick={() => setShowPackForm(false)}>Abbrechen</button>
            </div>
          </div>
        )}

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 10 }}>
          {packagingOptions.map((p) => (
            <div key={p.id} style={{
              background: theme.surface, border: `1px solid ${theme.border}`,
              borderRadius: theme.radiusSm, padding: "12px 14px",
              display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
              <div>
                <div style={{ fontWeight: 500, fontSize: 13 }}>{p.name}</div>
                <div style={{ fontFamily: theme.fontMono, fontSize: 16, fontWeight: 600, marginTop: 2 }}>{fmt(p.cost)}</div>
              </div>
              <div style={{ display: "flex", gap: 2 }}>
                <button style={{ ...css.btn("ghost"), padding: "4px 6px" }} onClick={() => {
                  setPackForm({ name: p.name, cost: String(p.cost) });
                  setEditPackId(p.id); setShowPackForm(true);
                }}><Icon type="edit" size={13} /></button>
                <button style={{ ...css.btn("ghost"), padding: "4px 6px", color: theme.red }} onClick={() => setPackagingOptions(packagingOptions.filter((o) => o.id !== p.id))}>
                  <Icon type="trash" size={13} />
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(GistBootloader));
  </script>
</body>
</html>
