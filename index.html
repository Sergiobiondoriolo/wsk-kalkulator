                <div style={{ fontSize: 16, fontWeight: 700, fontFamily: theme.fontMono, color: theme.green, marginTop: 2 }}>
                  {form.priceType === "brutto"
                    ? fmt(bruttoToNetto(parseFloat(form.ek), MWST_RATES.find((r) => r.id === form.mwst)?.rate || 19))
                    : fmt(nettoToBrutto(parseFloat(form.ek), 19))
                  }
                </div>
              </div>
            )}
          </div>
          {/* Row 3: Identifikationsnummern */}
          <div style={css.grid4}>
            <Field label="Art.-Nr. / SKU" style={{ marginTop: 12 }}>
              <input style={css.input} value={form.sku} onChange={(e) => setForm({ ...form, sku: e.target.value })} placeholder="z.B. 11115" />
            </Field>
            <Field label="EAN-Code" style={{ marginTop: 12 }}>
              <input style={css.input} value={form.ean} onChange={(e) => setForm({ ...form, ean: e.target.value })} placeholder="z.B. 7621500111152" />
            </Field>
            <Field label="PZN" style={{ marginTop: 12 }}>
              <input style={css.input} value={form.pzn} onChange={(e) => setForm({ ...form, pzn: e.target.value })} placeholder="z.B. 18742239" />
            </Field>
            <div style={{ marginTop: 12, display: "flex", alignItems: "flex-end", paddingBottom: 1 }}>
              <div style={{ fontSize: 11, color: theme.textDim, lineHeight: 1.4 }}>
                Gespeichert wird immer der <strong style={{ color: theme.green }}>Netto-Preis pro Stück</strong>.
                {form.priceType === "brutto" && " Brutto wird automatisch umgerechnet."}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <button style={css.btn("primary")} onClick={saveProduct}><Icon type="check" size={15} /> Speichern</button>
            <button style={css.btn("ghost")} onClick={resetForm}>Abbrechen</button>
          </div>
        </div>
      )}

      {/* Product Table */}
      {filtered.length > 0 ? (
        <div style={{ ...css.card, overflow: "auto" }}>
          <table style={css.table}>
            <thead>
              <tr>
                <th style={{ ...css.th, width: 36 }}>
                  <input
                    type="checkbox"
                    checked={allFilteredSelected}
                    onChange={toggleSelectAll}
                    style={{ accentColor: theme.accent, cursor: "pointer" }}
                  />
                </th>
                <th style={{ ...css.th, cursor: "pointer", userSelect: "none" }} onClick={() => handleSort("name")}>
                  Produkt <SortIcon col="name" />
                </th>
                <th style={{ ...css.th, cursor: "pointer", userSelect: "none" }} onClick={() => handleSort("supplier")}>
                  Preisliste <SortIcon col="supplier" />
                </th>
                <th style={{ ...css.th, cursor: "pointer", userSelect: "none" }} onClick={() => handleSort("sku")}>
                  Art.-Nr. <SortIcon col="sku" />
                </th>
                <th style={css.th}>EAN</th>
                <th style={css.th}>PZN</th>
                <th style={{ ...css.th, cursor: "pointer", userSelect: "none" }} onClick={() => handleSort("category")}>
                  Kategorie <SortIcon col="category" />
                </th>
                <th style={{ ...css.th, textAlign: "right", cursor: "pointer", userSelect: "none" }} onClick={() => handleSort("ek")}>
                  EK Netto <SortIcon col="ek" />
                </th>
                <th style={{ ...css.th, textAlign: "right" }}>Aktionen</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((p) => (
                <tr key={p.id} style={{ background: selected.has(p.id) ? theme.accentGlow : "transparent" }}>
                  <td style={{ ...css.td, width: 36 }}>
                    <input
                      type="checkbox"
                      checked={selected.has(p.id)}
                      onChange={() => toggleSelect(p.id)}
                      style={{ accentColor: theme.accent, cursor: "pointer" }}
                    />
                  </td>
                  <td style={{ ...css.td, fontWeight: 500 }}>{p.name}</td>
                  <td style={css.td}>
                    {p.supplierId ? (
                      <span style={css.badge(getSupplierColor(p.supplierId))}>{getSupplierName(p.supplierId)}</span>
                    ) : <span style={{ color: theme.textDim, fontSize: 12 }}>–</span>}
                  </td>
                  <td style={{ ...css.td, fontFamily: theme.fontMono, fontSize: 12, color: theme.textMuted }}>{p.sku || "–"}</td>
                  <td style={{ ...css.td, fontFamily: theme.fontMono, fontSize: 12, color: theme.textMuted }}>{p.ean || "–"}</td>
                  <td style={{ ...css.td, fontFamily: theme.fontMono, fontSize: 12, color: theme.textMuted }}>{p.pzn || "–"}</td>
                  <td style={css.td}>{p.category ? <span style={css.badge(theme.accent)}>{p.category}</span> : "–"}</td>
                  <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono, fontWeight: 600 }}>{fmt(p.ek)}</td>
                  <td style={{ ...css.td, textAlign: "right" }}>
                    <button style={{ ...css.btn("ghost"), padding: "4px 8px", marginRight: 4 }} onClick={() => startEdit(p)}>
                      <Icon type="edit" size={14} />
                    </button>
                    <button style={{ ...css.btn("ghost"), padding: "4px 8px", color: theme.red }} onClick={() => deleteProduct(p)}>
                      <Icon type="trash" size={14} />
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ) : products.length === 0 ? (
        <div style={{ ...css.card, ...css.emptyState }}>
          <Icon type="list" size={32} />
          <div style={{ marginTop: 12 }}>Noch keine Produkte gespeichert.</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Füge Produkte manuell hinzu oder importiere eine CSV-Datei.</div>
        </div>
      ) : (
        <div style={{ ...css.card, ...css.emptyState }}>
          <Icon type="search" size={32} />
          <div style={{ marginTop: 12 }}>Keine Produkte gefunden für „{search}"</div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TAB: PREISLISTEN (Supplier Management)
// ═══════════════════════════════════════════════════════════
function PreislistenTab({ suppliers, setSuppliers, products, setProducts, addLog }) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ name: "", color: "#3B82F6", notes: "", defaultPriceType: "netto", defaultMwst: "19" });
  const [openId, setOpenId] = useState(null); // Detail view

  // Upload state
  const [uploadSupplierId, setUploadSupplierId] = useState(null);
  const [uploadData, setUploadData] = useState(null); // { headers, rows, fileName }
  const [uploadMapping, setUploadMapping] = useState({ name: "", ek: "", sku: "", ean: "", pzn: "", category: "" });
  const [uploadPriceType, setUploadPriceType] = useState("netto");
  const [uploadMwst, setUploadMwst] = useState("19");
  const [uploadPreview, setUploadPreview] = useState([]);
  const [uploadError, setUploadError] = useState("");

  const COLORS = ["#E53238", "#3B82F6", "#22C55E", "#EAB308", "#A855F7", "#F97316", "#EC4899", "#06B6D4", "#10B981", "#8B5CF6", "#F43F5E", "#0EA5E9"];

  // ─── File Upload Logic ─────────────────
  const handleFileSelect = (file, supplierId) => {
    if (!file) return;
    setUploadError("");
    setUploadSupplierId(supplierId);

    // Auto-set price type from supplier defaults
    const sup = suppliers.find((s) => s.id === supplierId);
    if (sup) {
      setUploadPriceType(sup.defaultPriceType || "netto");
      setUploadMwst(sup.defaultMwst || "19");
    }

    const ext = file.name.split(".").pop().toLowerCase();
    if (["xlsx", "xls", "xlsm"].includes(ext)) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const json = readExcelFile(e.target.result);
          if (json.length < 2) { setUploadError("Datei enthält keine Daten."); return; }
          const headers = json[0].map((h) => String(h).trim());
          const rows = json.slice(1).filter((r) => r.some((c) => c !== ""));
          processUpload(headers, rows, file.name);
        } catch (err) {
          setUploadError("Fehler beim Lesen der Excel-Datei: " + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = (e) => {
        const text = e.target.result;
        const lines = text.trim().split("\n").filter((l) => l.trim());
        if (lines.length < 2) { setUploadError("Datei enthält keine Daten."); return; }
        let delim = ";";
        if (lines[0].includes("\t")) delim = "\t";
        else if (!lines[0].includes(";") && lines[0].includes(",")) delim = ",";
        const headers = lines[0].split(delim).map((h) => h.trim());
        const rows = lines.slice(1).map((l) => l.split(delim).map((c) => c.trim()));
        processUpload(headers, rows, file.name);
      };
      reader.readAsText(file, "UTF-8");
    }
  };

  const processUpload = (headers, rows, fileName) => {
    setUploadData({ headers, rows, fileName });
    // Auto-map columns by header name
    const mapping = { name: "", ek: "", sku: "", ean: "", pzn: "", category: "" };
    const lowerHeaders = headers.map((h) => h.toLowerCase());
    const findCol = (keywords) => {
      for (const kw of keywords) {
        const idx = lowerHeaders.findIndex((h) => h.includes(kw));
        if (idx !== -1) return String(idx);
      }
      return "";
    };
    mapping.name = findCol(["name", "bezeichnung", "produkt", "artikel", "product", "description"]);
    mapping.ek = findCol(["ek", "preis", "price", "netto", "brutto", "vk", "einkauf", "kosten"]);
    mapping.sku = findCol(["sku", "art", "artikelnr", "artikelnummer", "artnr", "item"]);
    mapping.ean = findCol(["ean", "gtin", "barcode"]);
    mapping.pzn = findCol(["pzn", "pharma"]);
    mapping.category = findCol(["kategorie", "category", "gruppe", "group", "warengruppe"]);
    setUploadMapping(mapping);
    updatePreview(mapping, rows);
  };

  const updatePreview = (mapping, rows) => {
    const data = rows || uploadData?.rows;
    if (!data) return;
    const preview = [];
    for (const row of data) {
      const name = mapping.name !== "" ? String(row[parseInt(mapping.name)] || "").trim() : "";
      const ekRaw = mapping.ek !== "" ? String(row[parseInt(mapping.ek)] || "").replace(",", ".").trim() : "";
      const ek = parseFloat(ekRaw);
      if (name && !isNaN(ek) && ek > 0) {
        preview.push({
          name,
          ek,
          sku: mapping.sku !== "" ? String(row[parseInt(mapping.sku)] || "").trim() : "",
          ean: mapping.ean !== "" ? String(row[parseInt(mapping.ean)] || "").trim() : "",
          pzn: mapping.pzn !== "" ? String(row[parseInt(mapping.pzn)] || "").trim() : "",
          category: mapping.category !== "" ? String(row[parseInt(mapping.category)] || "").trim() : "",
        });
      }
    }
    setUploadPreview(preview);
  };

  const handleMappingChange = (field, value) => {
    const newMapping = { ...uploadMapping, [field]: value };
    setUploadMapping(newMapping);
    updatePreview(newMapping);
  };

  const confirmUpload = () => {
    if (uploadPreview.length === 0) return;
    const mwstRate = MWST_RATES.find((r) => r.id === uploadMwst)?.rate || 19;
    const imported = uploadPreview.map((p) => {
      let ekNetto = p.ek;
      if (uploadPriceType === "brutto" && ekNetto > 0) {
        ekNetto = Math.round(bruttoToNetto(ekNetto, mwstRate) * 100) / 100;
      }
      return {
        id: uid(), ...p, ek: ekNetto, ekNetto: ekNetto,
        priceType: "netto", mwst: uploadMwst,
        supplierId: uploadSupplierId,
      };
    });
    setProducts([...products, ...imported]);
    const supName = suppliers.find((s) => s.id === uploadSupplierId)?.name || "?";
    const priceNote = uploadPriceType === "brutto" ? ` (Brutto→Netto, ${mwstRate}%)` : " (Netto)";
    addLog("Import", `${imported.length} Produkte → "${supName}"${priceNote}`);
    cancelUpload();
  };

  const cancelUpload = () => {
    setUploadSupplierId(null);
    setUploadData(null);
    setUploadMapping({ name: "", ek: "", sku: "", ean: "", pzn: "", category: "" });
    setUploadPreview([]);
    setUploadError("");
  };

  const saveSupplier = () => {
    if (!form.name) return;
    if (editId) {
      setSuppliers(suppliers.map((s) => (s.id === editId ? { ...s, ...form } : s)));
    } else {
      setSuppliers([...suppliers, { id: uid(), ...form }]);
    }
    setShowForm(false);
    setEditId(null);
    setForm({ name: "", color: "#3B82F6", notes: "", defaultPriceType: "netto", defaultMwst: "19" });
  };

  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [supplierSearch, setSupplierSearch] = useState("");

  const startEdit = (s) => {
    setForm({ name: s.name, color: s.color, notes: s.notes || "", defaultPriceType: s.defaultPriceType || "netto", defaultMwst: s.defaultMwst || "19" });
    setEditId(s.id);
    setShowForm(true);
  };

  const deleteSupplier = (id) => {
    setSuppliers(suppliers.filter((s) => s.id !== id));
    setProducts(products.map((p) => (p.supplierId === id ? { ...p, supplierId: "" } : p)));
    setConfirmDeleteId(null);
  };

  const getProductCount = (id) => products.filter((p) => p.supplierId === id).length;
  const getCategories = (id) => [...new Set(products.filter((p) => p.supplierId === id).map((p) => p.category).filter(Boolean))];
  const getPriceRange = (id) => {
    const prods = products.filter((p) => p.supplierId === id);
    if (prods.length === 0) return null;
    const prices = prods.map((p) => p.ek);
    return { min: Math.min(...prices), max: Math.max(...prices) };
  };

  const handleLogoUpload = (supplierId, file) => {
    if (!file || !file.type.startsWith("image/")) return;
    if (file.size > 500000) { alert("Logo max. 500 KB"); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      setSuppliers(suppliers.map((s) => s.id === supplierId ? { ...s, logo: e.target.result } : s));
    };
    reader.readAsDataURL(file);
  };

  const handleAttachmentUpload = (supplierId, file) => {
    if (!file) return;
    if (file.size > 2000000) { alert("Datei max. 2 MB"); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const attachment = {
        id: uid(),
        name: file.name,
        type: file.type || "application/octet-stream",
        size: file.size,
        data: e.target.result,
        addedAt: new Date().toISOString(),
      };
      setSuppliers(suppliers.map((s) => s.id === supplierId ? { ...s, attachments: [...(s.attachments || []), attachment] } : s));
      addLog("Datei hinzugefügt", `"${file.name}" → ${suppliers.find((s) => s.id === supplierId)?.name}`);
    };
    reader.readAsDataURL(file);
  };

  const removeAttachment = (supplierId, attachId) => {
    setSuppliers(suppliers.map((s) => s.id === supplierId ? { ...s, attachments: (s.attachments || []).filter((a) => a.id !== attachId) } : s));
  };

  const downloadAttachment = (att) => {
    const a = document.createElement("a");
    a.href = att.data;
    a.download = att.name;
    a.click();
  };

  const formatFileSize = (bytes) => {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1048576).toFixed(1) + " MB";
  };

  const getFileIcon = (type) => {
    if (type.includes("pdf")) return "📄";
    if (type.includes("sheet") || type.includes("excel") || type.includes("csv")) return "📊";
    if (type.includes("image")) return "🖼️";
    return "📎";
  };

  const openSupplier = suppliers.find((s) => s.id === openId);
  const openProducts = openId ? products.filter((p) => p.supplierId === openId) : [];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ fontSize: 15, fontWeight: 600 }}>Lieferanten & Preislisten</div>
        <button style={css.btn("primary")} onClick={() => { setForm({ name: "", color: COLORS[suppliers.length % COLORS.length], notes: "", defaultPriceType: "netto", defaultMwst: "19" }); setEditId(null); setShowForm(true); }}>
          <Icon type="plus" size={15} /> Neue Preisliste
        </button>
      </div>

      {suppliers.length > 1 && !openId && (
        <div style={{ marginBottom: 12 }}>
          <input
            type="text"
            placeholder={"Preisliste suchen... (" + suppliers.length + " Lieferanten)"}
            value={supplierSearch}
            onChange={(e) => setSupplierSearch(e.target.value)}
            style={{ ...css.input, width: "100%", padding: "10px 14px", fontSize: 13 }}
          />
        </div>
      )}

      {showForm && (
        <div style={css.card}>
          <div style={css.cardTitle}>{editId ? "Preisliste bearbeiten" : "Neue Preisliste"}</div>
          <div style={css.grid3}>
            <Field label="Name / Lieferant *">
              <input style={css.input} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="z.B. Rausch, Bünting, L'Oréal..." />
            </Field>
            <Field label="Farbe">
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {COLORS.map((c) => (
                  <div
                    key={c}
                    onClick={() => setForm({ ...form, color: c })}
                    style={{
                      width: 28, height: 28, borderRadius: 6, background: c, cursor: "pointer",
                      border: form.color === c ? "2px solid #fff" : "2px solid transparent",
                      transition: "border 0.15s",
                    }}
                  />
                ))}
              </div>
            </Field>
            <Field label="Notizen">
              <input style={css.input} value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} placeholder="z.B. Frei Haus ab 400€ Netto" />
            </Field>
          </div>
          {/* Default pricing row */}
          <div style={{ marginTop: 12, padding: "12px 14px", background: theme.surface, borderRadius: theme.radiusSm, border: `1px solid ${theme.border}` }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: theme.textMuted, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.04em" }}>
              Standard-Preiseinstellung für Importe
            </div>
            <div style={{ display: "flex", gap: 16, alignItems: "end", flexWrap: "wrap" }}>
              <Field label="Preise sind normalerweise...">
                <div style={{ display: "flex", borderRadius: theme.radiusSm, overflow: "hidden", border: `1px solid ${theme.border}` }}>
                  {["netto", "brutto"].map((pt) => (
                    <button
                      key={pt}
                      style={{
                        padding: "7px 16px", fontSize: 12, fontWeight: 600, border: "none", cursor: "pointer",
                        fontFamily: theme.font,
                        background: form.defaultPriceType === pt ? (pt === "netto" ? theme.green : theme.yellow) : theme.surface,
                        color: form.defaultPriceType === pt ? "#fff" : theme.textMuted,
                        transition: "all 0.15s",
                      }}
                      onClick={() => setForm({ ...form, defaultPriceType: pt })}
                    >
                      {pt === "netto" ? "Netto" : "Brutto"}
                    </button>
                  ))}
                </div>
              </Field>
              {form.defaultPriceType === "brutto" && (
                <Field label="Standard MwSt-Satz">
                  <select style={css.select} value={form.defaultMwst} onChange={(e) => setForm({ ...form, defaultMwst: e.target.value })}>
                    {MWST_RATES.map((r) => (
                      <option key={r.id} value={r.id}>{r.label}</option>
                    ))}
                  </select>
                </Field>
              )}
              <div style={{ fontSize: 12, color: theme.textDim, paddingBottom: 8 }}>
                Diese Einstellung wird beim Import als Vorauswahl übernommen.
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <button style={css.btn("primary")} onClick={saveSupplier}><Icon type="check" size={15} /> Speichern</button>
            <button style={css.btn("ghost")} onClick={() => { setShowForm(false); setEditId(null); }}>Abbrechen</button>
          </div>
        </div>
      )}

      {suppliers.length > 0 ? (
        openId && openSupplier ? (
          /* ─── DETAIL VIEW ──────────────────── */
          <div>
            {/* Back button */}
            <button style={{ ...css.btn("ghost"), marginBottom: 14, fontSize: 13 }} onClick={() => setOpenId(null)}>
              <Icon type="arrow" size={14} style={{ transform: "rotate(180deg)" }} /> ← Zurück zur Übersicht
            </button>

            {/* Header card */}
            <div style={{ ...css.card, borderLeft: `4px solid ${openSupplier.color}` }}>
              <div style={{ display: "flex", gap: 20, alignItems: "flex-start" }}>
                {/* Logo area */}
                <div
                  style={{
                    width: 80, height: 80, borderRadius: 12, flexShrink: 0,
                    background: openSupplier.logo ? "transparent" : theme.surface,
                    border: `2px dashed ${openSupplier.logo ? "transparent" : theme.border}`,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    cursor: "pointer", overflow: "hidden", position: "relative",
                    transition: "border-color 0.2s",
                  }}
                  onClick={() => document.getElementById("logo-upload").click()}
                  onMouseEnter={(e) => { if (!openSupplier.logo) e.currentTarget.style.borderColor = openSupplier.color; }}
                  onMouseLeave={(e) => { if (!openSupplier.logo) e.currentTarget.style.borderColor = theme.border; }}
                >
                  {openSupplier.logo ? (
                    <img src={openSupplier.logo} alt="Logo" style={{ width: "100%", height: "100%", objectFit: "contain" }} />
                  ) : (
                    <div style={{ textAlign: "center" }}>
                      <Icon type="upload" size={20} />
                      <div style={{ fontSize: 9, color: theme.textDim, marginTop: 2 }}>Logo</div>
                    </div>
                  )}
                  <input id="logo-upload" type="file" accept="image/*" style={{ display: "none" }}
                    onChange={(e) => { handleLogoUpload(openId, e.target.files[0]); e.target.value = ""; }} />
                </div>

                {/* Info */}
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 22, fontWeight: 700, display: "flex", alignItems: "center", gap: 10 }}>
                    {openSupplier.name}
                    {openSupplier.logo && (
                      <button style={{ ...css.btn("ghost"), padding: "2px 6px", fontSize: 10, color: theme.red }}
                        onClick={() => setSuppliers(suppliers.map((s) => s.id === openId ? { ...s, logo: null } : s))}>
                        Logo entfernen
                      </button>
                    )}
                  </div>
                  {openSupplier.notes && (
                    <div style={{ fontSize: 13, color: theme.textMuted, marginTop: 4, fontStyle: "italic" }}>{openSupplier.notes}</div>
                  )}
                  <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                    <span style={css.badge(openSupplier.color)}>{getProductCount(openId)} Produkte</span>
                    <span style={css.badge(openSupplier.defaultPriceType === "brutto" ? theme.yellow : theme.green)}>
                      {openSupplier.defaultPriceType === "brutto" ? `Brutto (${openSupplier.defaultMwst || 19}% MwSt)` : "Netto-Preise"}
                    </span>
                    {(() => { const range = getPriceRange(openId); return range ? <span style={css.badge(theme.textMuted)}>EK: {fmt(range.min)} – {fmt(range.max)}</span> : null; })()}
                    {getCategories(openId).map((c) => <span key={c} style={css.badge(theme.accent)}>{c}</span>)}
                  </div>
                </div>

                <div style={{ display: "flex", gap: 4 }}>
                  <button style={css.btn("ghost")} onClick={() => startEdit(openSupplier)}>
                    <Icon type="edit" size={14} /> Bearbeiten
                  </button>
                </div>
              </div>
            </div>

            {/* Dateien / Attachments */}
            <div style={css.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div style={css.cardTitle}>📁 Dateien & Dokumente</div>
                <button style={css.btn("ghost")} onClick={() => document.getElementById("att-upload").click()}>
                  <Icon type="upload" size={14} /> Datei hochladen
                </button>
                <input id="att-upload" type="file" accept=".pdf,.xlsx,.xls,.csv,.png,.jpg,.jpeg,.doc,.docx" style={{ display: "none" }}
                  onChange={(e) => { handleAttachmentUpload(openId, e.target.files[0]); e.target.value = ""; }} />
              </div>

              {(openSupplier.attachments || []).length > 0 ? (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 10 }}>
                  {(openSupplier.attachments || []).map((att) => (
                    <div key={att.id} style={{
                      padding: "12px 14px", background: theme.surface, borderRadius: theme.radiusSm,
                      border: `1px solid ${theme.border}`, display: "flex", alignItems: "center", gap: 10,
                      cursor: "pointer", transition: "border-color 0.15s",
                    }}
                    onMouseEnter={(e) => e.currentTarget.style.borderColor = theme.accent}
                    onMouseLeave={(e) => e.currentTarget.style.borderColor = theme.border}
                    onClick={() => downloadAttachment(att)}
                    >
                      <div style={{ fontSize: 28, lineHeight: 1 }}>{getFileIcon(att.type)}</div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{att.name}</div>
                        <div style={{ fontSize: 11, color: theme.textMuted }}>{formatFileSize(att.size)}</div>
                      </div>
                      <button style={{ ...css.btn("ghost"), padding: "2px 4px", color: theme.red, flexShrink: 0 }}
                        onClick={(e) => { e.stopPropagation(); removeAttachment(openId, att.id); }}>
                        <Icon type="x" size={12} />
                      </button>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{
                  padding: 24, textAlign: "center", color: theme.textDim,
                  border: `2px dashed ${theme.border}`, borderRadius: theme.radius,
                  cursor: "pointer",
                }}
                onClick={() => document.getElementById("att-upload").click()}
                >
                  <div style={{ fontSize: 28, marginBottom: 6 }}>📁</div>
                  <div style={{ fontSize: 13 }}>PDFs, Excel-Dateien oder Bilder hier ablegen</div>
                  <div style={{ fontSize: 11, marginTop: 4 }}>z.B. Original-Preisliste, Rahmenvertrag, Katalog</div>
                </div>
              )}
            </div>

            {/* Import button for this supplier */}
            <div style={{ ...css.card, display: "flex", gap: 10, alignItems: "center" }}>
              <button
                style={{ ...css.btn("primary"), fontSize: 13 }}
                onClick={() => document.getElementById(`upload-detail-${openId}`).click()}
              >
                <Icon type="upload" size={15} /> Produkte importieren (Excel / CSV)
              </button>
              <span style={{ fontSize: 12, color: theme.textMuted }}>
                Neue Produkte direkt dieser Preisliste zuordnen
              </span>
              <input
                id={`upload-detail-${openId}`}
                type="file"
                accept=".xlsx,.xls,.xlsm,.csv,.txt,.tsv"
                style={{ display: "none" }}
                onChange={(e) => { handleFileSelect(e.target.files[0], openId); e.target.value = ""; }}
              />
            </div>

            {/* Products table */}
            <div style={css.card}>
              <div style={css.cardTitle}>
                <Icon type="list" size={16} /> Produkte ({openProducts.length})
              </div>
              {openProducts.length > 0 ? (
                <div style={{ overflow: "auto", maxHeight: 500 }}>
                  <table style={css.table}>
                    <thead>
                      <tr>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>Produkt</th>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>Art.-Nr.</th>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>PZN</th>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>EAN</th>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>Kategorie</th>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card, textAlign: "right" }}>EK Netto</th>
                      </tr>
                    </thead>
                    <tbody>
                      {openProducts.map((p) => (
                        <tr key={p.id}>
                          <td style={{ ...css.td, fontWeight: 500 }}>{p.name}</td>
                          <td style={{ ...css.td, fontFamily: theme.fontMono, fontSize: 12, color: theme.textMuted }}>{p.sku || "–"}</td>
                          <td style={{ ...css.td, fontFamily: theme.fontMono, fontSize: 12, color: theme.textMuted }}>{p.pzn || "–"}</td>
                          <td style={{ ...css.td, fontFamily: theme.fontMono, fontSize: 12, color: theme.textMuted }}>{p.ean || "–"}</td>
                          <td style={css.td}>{p.category ? <span style={css.badge(theme.accent)}>{p.category}</span> : "–"}</td>
                          <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono, fontWeight: 600 }}>{fmt(p.ek)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              ) : (
                <div style={{ padding: 24, textAlign: "center", color: theme.textDim }}>
                  <Icon type="list" size={28} />
                  <div style={{ marginTop: 8 }}>Noch keine Produkte in dieser Preisliste.</div>
                  <div style={{ fontSize: 12, marginTop: 4 }}>Importiere eine CSV/Excel oder ordne vorhandene Produkte zu.</div>
                </div>
              )}
            </div>
          </div>
        ) : (
          /* ─── COMPACT CARD GRID ──────────────────── */
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 8 }}>
          {suppliers.filter((s) => !supplierSearch || s.name.toLowerCase().includes(supplierSearch.toLowerCase())).map((s) => {
            const count = getProductCount(s.id);
            const range = getPriceRange(s.id);
            return (
              <div key={s.id} style={{
                padding: "8px 12px",
                background: theme.card,
                borderRadius: 8,
                borderLeft: `3px solid ${s.color}`,
                cursor: "pointer",
                transition: "transform 0.12s, box-shadow 0.12s",
                border: `1px solid ${theme.border}`,
                borderLeftWidth: 3,
                borderLeftColor: s.color,
                display: "flex", alignItems: "center", gap: 10,
              }}
              onClick={() => setOpenId(s.id)}
              onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 3px 10px rgba(0,0,0,0.2)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = "none"; }}
              >
                {s.logo ? (
                  <div style={{ width: 30, height: 30, borderRadius: 6, overflow: "hidden", flexShrink: 0, background: "#fff", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <img src={s.logo} alt="" style={{ width: "100%", height: "100%", objectFit: "contain" }} />
                  </div>
                ) : (
                  <div style={{ width: 30, height: 30, borderRadius: 6, flexShrink: 0, background: s.color + "22", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: s.color }}>{s.name.charAt(0)}</span>
                  </div>
                )}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</div>
                  <div style={{ fontSize: 11, color: theme.textMuted, marginTop: 1 }}>
                    <span style={{ color: s.color, fontWeight: 600, fontFamily: theme.fontMono }}>{count}</span> Produkte{range ? <span style={{ fontFamily: theme.fontMono }}> · {fmt(range.min)} – {fmt(range.max)}</span> : ""}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 2, flexShrink: 0 }} onClick={(e) => e.stopPropagation()}>
                  <button style={{ ...css.btn("ghost"), padding: "2px 4px" }} onClick={() => startEdit(s)}>
                    <Icon type="edit" size={11} />
                  </button>
                  {confirmDeleteId === s.id ? (
                    <div style={{ display: "flex", gap: 2 }}>
                      <button style={{ ...css.btn("danger"), padding: "2px 6px", fontSize: 10 }} onClick={() => deleteSupplier(s.id)}>Ja</button>
                      <button style={{ ...css.btn("ghost"), padding: "2px 4px", fontSize: 10 }} onClick={() => setConfirmDeleteId(null)}>Nein</button>
                    </div>
                  ) : (
                    <button style={{ ...css.btn("ghost"), padding: "2px 4px", color: theme.red }} onClick={() => setConfirmDeleteId(s.id)}>
                      <Icon type="trash" size={11} />
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        )
      ) : (
        <div style={{ ...css.card, ...css.emptyState }}>
          <Icon type="tag" size={32} />
          <div style={{ marginTop: 12, fontSize: 15, fontWeight: 500 }}>Noch keine Preislisten angelegt</div>
          <div style={{ fontSize: 13, marginTop: 4, maxWidth: 400, margin: "4px auto 0" }}>
            Erstelle Preislisten für deine Lieferanten (z.B. „Rausch", „Bünting"). Beim Produkt-Import kannst du dann direkt zuordnen.
          </div>
        </div>
      )}

      {/* ─── Upload Modal ──────────────────── */}
      {uploadData && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.7)", zIndex: 1000,
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: 20,
        }} onClick={(e) => e.target === e.currentTarget && cancelUpload()}>
          <div style={{
            background: theme.card, border: `1px solid ${theme.border}`,
            borderRadius: 16, width: "100%", maxWidth: 900, maxHeight: "90vh",
            overflow: "auto", padding: 28,
            boxShadow: "0 24px 80px rgba(0,0,0,0.5)",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 18, fontWeight: 700, display: "flex", alignItems: "center", gap: 8 }}>
                  <Icon type="upload" size={20} /> Preisliste importieren
                </div>
                <div style={{ fontSize: 13, color: theme.textMuted, marginTop: 4 }}>
                  {uploadData.fileName} → <strong style={{ color: suppliers.find((s) => s.id === uploadSupplierId)?.color }}>
                    {suppliers.find((s) => s.id === uploadSupplierId)?.name}
                  </strong>
                  {" "}({uploadData.rows.length} Zeilen, {uploadData.headers.length} Spalten)
                </div>
              </div>
              <button style={{ ...css.btn("ghost"), padding: "6px" }} onClick={cancelUpload}>
                <Icon type="x" size={18} />
              </button>
            </div>

            {/* Column Mapping */}
            <div style={css.card}>
              <div style={css.cardTitle}><Icon type="settings" size={16} /> Spalten zuordnen</div>
              <div style={{ fontSize: 12, color: theme.textMuted, marginBottom: 12 }}>
                Ordne die Spalten deiner Datei den richtigen Feldern zu. Name und EK-Preis sind Pflicht.
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                {[
                  { key: "name", label: "Produktname *", required: true },
                  { key: "ek", label: "EK-Preis *", required: true },
                  { key: "sku", label: "Art.-Nr. / SKU" },
                  { key: "ean", label: "EAN-Code" },
                  { key: "pzn", label: "PZN" },
                  { key: "category", label: "Kategorie" },
                ].map((f) => (
                  <Field key={f.key} label={f.label}>
                    <select
                      style={{ ...css.select, borderColor: f.required && !uploadMapping[f.key] ? theme.red + "66" : theme.border }}
                      value={uploadMapping[f.key]}
                      onChange={(e) => handleMappingChange(f.key, e.target.value)}
                    >
                      <option value="">— Nicht zuordnen —</option>
                      {uploadData.headers.map((h, i) => (
                        <option key={i} value={String(i)}>
                          {h || `Spalte ${i + 1}`} (z.B. „{String(uploadData.rows[0]?.[i] || "").substring(0, 25)}")
                        </option>
                      ))}
                    </select>
                  </Field>
                ))}
              </div>
            </div>

            {/* Price Type */}
            <div style={{ ...css.card, marginTop: 0 }}>
              <div style={{ display: "flex", gap: 16, alignItems: "end", flexWrap: "wrap" }}>
                <Field label="Preise in der Datei sind...">
                  <div style={{ display: "flex", borderRadius: theme.radiusSm, overflow: "hidden", border: `1px solid ${theme.border}` }}>
                    {["netto", "brutto"].map((pt) => (
                      <button
                        key={pt}
                        style={{
                          padding: "8px 18px", fontSize: 13, fontWeight: 600, border: "none", cursor: "pointer",
                          fontFamily: theme.font,
                          background: uploadPriceType === pt ? (pt === "netto" ? theme.green : theme.yellow) : theme.surface,
                          color: uploadPriceType === pt ? "#fff" : theme.textMuted,
                        }}
                        onClick={() => setUploadPriceType(pt)}
                      >
                        {pt === "netto" ? "Netto (exkl. MwSt)" : "Brutto (inkl. MwSt)"}
                      </button>
                    ))}
                  </div>
                </Field>
                {uploadPriceType === "brutto" && (
                  <Field label="MwSt-Satz">
                    <select style={css.select} value={uploadMwst} onChange={(e) => setUploadMwst(e.target.value)}>
                      {MWST_RATES.map((r) => (
                        <option key={r.id} value={r.id}>{r.label}</option>
                      ))}
                    </select>
                  </Field>
                )}
              </div>
            </div>

            {/* Error */}
            {uploadError && (
              <div style={{ padding: "10px 14px", background: theme.redGlow, border: `1px solid ${theme.red}33`, borderRadius: theme.radiusSm, fontSize: 13, color: theme.red, marginBottom: 14 }}>
                {uploadError}
              </div>
            )}

            {/* Preview */}
            {uploadPreview.length > 0 ? (
              <div style={css.card}>
                <div style={{ fontSize: 14, fontWeight: 600, color: theme.green, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                  <Icon type="check" size={16} /> {uploadPreview.length} Produkte erkannt
                </div>
                <div style={{ maxHeight: 280, overflow: "auto", border: `1px solid ${theme.border}`, borderRadius: theme.radiusSm }}>
                  <table style={css.table}>
                    <thead>
                      <tr>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>Name</th>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card, textAlign: "right" }}>
                          {uploadPriceType === "brutto" ? "Brutto" : "EK Netto"}
                        </th>
                        {uploadPriceType === "brutto" && (
                          <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card, textAlign: "right", color: theme.green }}>→ Netto</th>
                        )}
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>SKU</th>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>PZN</th>
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>Kat.</th>
                      </tr>
                    </thead>
                    <tbody>
                      {uploadPreview.slice(0, 20).map((p, i) => (
                        <tr key={i}>
                          <td style={{ ...css.td, fontSize: 12 }}>{p.name}</td>
                          <td style={{ ...css.td, fontSize: 12, textAlign: "right", fontFamily: theme.fontMono }}>{fmt(p.ek)}</td>
                          {uploadPriceType === "brutto" && (
                            <td style={{ ...css.td, fontSize: 12, textAlign: "right", fontFamily: theme.fontMono, color: theme.green, fontWeight: 600 }}>
                              {fmt(bruttoToNetto(p.ek, MWST_RATES.find((r) => r.id === uploadMwst)?.rate || 19))}
                            </td>
                          )}
                          <td style={{ ...css.td, fontSize: 12, fontFamily: theme.fontMono, color: theme.textMuted }}>{p.sku || "–"}</td>
                          <td style={{ ...css.td, fontSize: 12, fontFamily: theme.fontMono, color: theme.textMuted }}>{p.pzn || "–"}</td>
                          <td style={{ ...css.td, fontSize: 12 }}>{p.category || "–"}</td>
                        </tr>
                      ))}
                      {uploadPreview.length > 20 && (
                        <tr>
                          <td colSpan={uploadPriceType === "brutto" ? 6 : 5} style={{ ...css.td, fontSize: 12, color: theme.textMuted, textAlign: "center" }}>
                            ... und {uploadPreview.length - 20} weitere
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : uploadMapping.name && uploadMapping.ek ? (
              <div style={{ ...css.card, ...css.emptyState }}>
                <Icon type="search" size={28} />
                <div style={{ marginTop: 10, fontSize: 13 }}>Keine gültigen Produkte erkannt. Prüfe die Spaltenzuordnung.</div>
              </div>
            ) : null}

            {/* Actions */}
            <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 14 }}>
              <button style={css.btn("ghost")} onClick={cancelUpload}>Abbrechen</button>
              <button
                style={{ ...css.btn("primary"), opacity: uploadPreview.length > 0 ? 1 : 0.4 }}
                onClick={confirmUpload}
                disabled={uploadPreview.length === 0}
              >
                <Icon type="check" size={15} /> {uploadPreview.length} Produkte importieren
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TAB: MARKTPLÄTZE
// ═══════════════════════════════════════════════════════════
function MarktplaetzeTab({ marketplaces, setMarketplaces }) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ name: "", provision: "", fixedFee: "0", color: "#3B82F6", categories: [] });
  const [catForm, setCatForm] = useState({ name: "", provision: "" });

  const toggleActive = (id) => {
    setMarketplaces(marketplaces.map((m) => (m.id === id ? { ...m, active: !m.active } : m)));
  };

  const saveMarketplace = () => {
    if (!form.name || !form.provision) return;
    const entry = {
      name: form.name,
      provision: parseFloat(form.provision),
      fixedFee: parseFloat(form.fixedFee) || 0,
      color: form.color,
      categories: form.categories || [],
      active: true,
    };
    if (editId) {
      setMarketplaces(marketplaces.map((m) => (m.id === editId ? { ...m, ...entry } : m)));
    } else {
      setMarketplaces([...marketplaces, { id: uid(), ...entry }]);
    }
    setShowForm(false);
    setEditId(null);
    setForm({ name: "", provision: "", fixedFee: "0", color: "#3B82F6", categories: [] });
  };

  const startEdit = (m) => {
    setForm({ name: m.name, provision: String(m.provision), fixedFee: String(m.fixedFee), color: m.color, categories: m.categories || [] });
    setEditId(m.id);
    setShowForm(true);
  };

  const deleteMarketplace = (id) => {
    setMarketplaces(marketplaces.filter((m) => m.id !== id));
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
        <div style={{ fontSize: 13, color: theme.textMuted }}>
          Konfiguriere die Marktplätze und deren Provisionen. Aktive Marktplätze werden im Kalkulator angezeigt.
        </div>
        <button style={css.btn("primary")} onClick={() => { setForm({ name: "", provision: "", fixedFee: "0", color: "#3B82F6" }); setEditId(null); setShowForm(true); }}>
          <Icon type="plus" size={15} /> Marktplatz hinzufügen
        </button>
      </div>

      {showForm && (
        <div style={css.card}>
          <div style={css.cardTitle}>{editId ? "Marktplatz bearbeiten" : "Neuer Marktplatz"}</div>
          <div style={css.grid4}>
            <Field label="Name *">
              <input style={css.input} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="z.B. Shopify" />
            </Field>
            <Field label="Provision (%) *">
              <input style={{ ...css.input, fontFamily: theme.fontMono }} type="number" step="0.1" value={form.provision} onChange={(e) => setForm({ ...form, provision: e.target.value })} placeholder="z.B. 12" />
            </Field>
            <Field label="Fixgebühr pro Verkauf (€)">
              <input style={{ ...css.input, fontFamily: theme.fontMono }} type="number" step="0.01" value={form.fixedFee} onChange={(e) => setForm({ ...form, fixedFee: e.target.value })} placeholder="0.00" />
            </Field>
            <Field label="Farbe">
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <input type="color" value={form.color} onChange={(e) => setForm({ ...form, color: e.target.value })} style={{ width: 38, height: 38, border: "none", background: "none", cursor: "pointer" }} />
                <span style={{ fontSize: 12, color: theme.textMuted, fontFamily: theme.fontMono }}>{form.color}</span>
              </div>
            </Field>
            <div style={{ marginTop: 12, padding: "12px", background: theme.surface, borderRadius: 8, border: "1px solid " + theme.border }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 6 }}>Kategorie-Provisionen (optional)</div>
              <div style={{ fontSize: 11, color: theme.textMuted, marginBottom: 8 }}>Verschiedene Provisionen je Produktkategorie. Im Kalkulator per Dropdown waehlbar.</div>
              {(form.categories || []).map((cat, i) => (
                <div key={i} style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 4, padding: "4px 8px", background: theme.card, borderRadius: 4 }}>
                  <span style={{ fontSize: 12, flex: 1 }}>{cat.name}</span>
                  <span style={{ fontSize: 12, fontFamily: theme.fontMono, fontWeight: 600 }}>{cat.provision}%</span>
                  <button style={{ background: "none", border: "none", color: theme.red, cursor: "pointer", fontSize: 13, padding: "2px 6px" }} onClick={() => setForm({ ...form, categories: form.categories.filter((_, j) => j !== i) })}>&#10005;</button>
                </div>
              ))}
              <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                <input style={{ ...css.input, flex: 1, fontSize: 12, padding: "6px 8px" }} value={catForm.name} onChange={(e) => setCatForm({ ...catForm, name: e.target.value })} placeholder="Kategorie-Name" />
                <input style={{ ...css.input, width: 65, fontSize: 12, padding: "6px 8px", fontFamily: theme.fontMono }} type="number" step="0.1" value={catForm.provision} onChange={(e) => setCatForm({ ...catForm, provision: e.target.value })} placeholder="%" />
                <button style={{ ...css.btn("ghost"), fontSize: 12, padding: "6px 10px" }} onClick={() => { if (catForm.name && catForm.provision) { setForm({ ...form, categories: [...(form.categories || []), { name: catForm.name, provision: parseFloat(catForm.provision) }] }); setCatForm({ name: "", provision: "" }); } }}>+</button>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <button style={css.btn("primary")} onClick={saveMarketplace}><Icon type="check" size={15} /> Speichern</button>
            <button style={css.btn("ghost")} onClick={() => { setShowForm(false); setEditId(null); }}>Abbrechen</button>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>
        {marketplaces.map((m) => (
          <div key={m.id} style={{
            ...css.card, marginBottom: 0,
            borderLeft: `3px solid ${m.color}`,
            opacity: m.active ? 1 : 0.5,
            transition: "opacity 0.2s",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 16, fontWeight: 600 }}>{m.name}</div>
                <div style={{ display: "flex", gap: 16, marginTop: 10 }}>
                  <div>
                    <div style={css.label}>Provision</div>
                    <div style={{ fontSize: 20, fontWeight: 700, fontFamily: theme.fontMono, color: m.color }}>
                      {fmtP(m.provision)}
                    </div>
                    {m.categories && m.categories.length > 0 && <div style={{ fontSize: 10, color: theme.primary, marginTop: 2 }}>{m.categories.length} Kategorien</div>}
                  </div>
                  {m.fixedFee > 0 && (
                    <div>
                      <div style={css.label}>Fixgebühr</div>
                      <div style={{ fontSize: 20, fontWeight: 700, fontFamily: theme.fontMono, color: theme.textMuted }}>
                        {fmt(m.fixedFee)}
                      </div>
                    </div>
                  )}
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, alignItems: "flex-end" }}>
                <button
                  style={{
                    ...css.btn("ghost"), padding: "4px 10px", fontSize: 11,
                    background: m.active ? theme.greenGlow : theme.redGlow,
                    color: m.active ? theme.green : theme.red,
                    borderColor: m.active ? theme.green + "33" : theme.red + "33",
                  }}
                  onClick={() => toggleActive(m.id)}
                >
                  {m.active ? "Aktiv" : "Inaktiv"}
                </button>
                <div style={{ display: "flex", gap: 2, marginTop: 4 }}>
                  <button style={{ ...css.btn("ghost"), padding: "4px 6px" }} onClick={() => startEdit(m)}>
                    <Icon type="edit" size={13} />
                  </button>
                  <button style={{ ...css.btn("ghost"), padding: "4px 6px", color: theme.red }} onClick={() => deleteMarketplace(m.id)}>
                    <Icon type="trash" size={13} />
                  </button>
                </div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TAB: PAPIERKORB
// ═══════════════════════════════════════════════════════════
function PapierkorbTab({ trash, setTrash, products, setProducts, suppliers, addLog, appPassword }) {
  const [selected, setSelected] = useState(new Set());
  const [confirmEmpty, setConfirmEmpty] = useState(false);
  const [emptyPw, setEmptyPw] = useState("");
  const [emptyPwError, setEmptyPwError] = useState(false);
  const [confirmBulkDelete, setConfirmBulkDelete] = useState(false);
  const [bulkDeletePw, setBulkDeletePw] = useState("");
  const [bulkDeletePwError, setBulkDeletePwError] = useState(false);

  const getSupplierName = (id) => suppliers.find((s) => s.id === id)?.name || "";
  const getSupplierColor = (id) => suppliers.find((s) => s.id === id)?.color || theme.textMuted;

  const allSelected = trash.length > 0 && trash.every((p) => selected.has(p.id));

  const toggleSelect = (id) => {
    const next = new Set(selected);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelected(next);
  };

  const toggleSelectAll = () => {
    if (allSelected) {
      setSelected(new Set());
    } else {
      setSelected(new Set(trash.map((p) => p.id)));
    }
  };

  const restoreSelected = () => {
    const toRestore = trash.filter((p) => selected.has(p.id)).map(({ deletedAt, ...p }) => p);
    setProducts([...products, ...toRestore]);
    setTrash(trash.filter((p) => !selected.has(p.id)));
    addLog("Wiederhergestellt", `${toRestore.length} Produkte wiederhergestellt`);
    setSelected(new Set());
  };

  const restoreOne = (item) => {
    const { deletedAt, ...p } = item;
    setProducts([...products, p]);
    setTrash(trash.filter((t) => t.id !== item.id));
    addLog("Wiederhergestellt", `"${item.name}" wiederhergestellt`);
  };

  const permanentDeleteSelected = () => {
    if (bulkDeletePw !== appPassword) {
      setBulkDeletePwError(true);
      return;
    }
    const count = selected.size;
    setTrash(trash.filter((p) => !selected.has(p.id)));
    addLog("Endgültig gelöscht", `${count} Produkte endgültig gelöscht`);
    setSelected(new Set());
    setConfirmBulkDelete(false);
    setBulkDeletePw("");
    setBulkDeletePwError(false);
  };

  const emptyTrash = () => {
    if (emptyPw !== appPassword) {
      setEmptyPwError(true);
      return;
    }
    const count = trash.length;
    setTrash([]);
    addLog("Papierkorb geleert", `${count} Produkte endgültig gelöscht`);
    setConfirmEmpty(false);
    setEmptyPw("");
    setEmptyPwError(false);
    setSelected(new Set());
  };

  const formatDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <div style={{ fontSize: 15, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
            <Icon type="trash" size={18} /> Papierkorb
            {trash.length > 0 && <span style={css.badge(theme.red)}>{trash.length} Produkte</span>}
          </div>
          <div style={{ fontSize: 13, color: theme.textMuted, marginTop: 2 }}>
            Gelöschte Produkte landen hier. Du kannst sie wiederherstellen oder endgültig löschen.
          </div>
        </div>
        {trash.length > 0 && (
          confirmEmpty ? (
            <div style={{ display: "flex", gap: 6, alignItems: "center", padding: "8px 12px", background: theme.redGlow, borderRadius: theme.radiusSm, border: `1px solid ${theme.red}33`, flexWrap: "wrap" }}>
              <span style={{ fontSize: 12, color: theme.red, fontWeight: 500 }}>Papierkorb endgültig leeren — Passwort:</span>
              <div style={{ position: "relative" }}>
                <input
                  type="password"
                  style={{
                    ...css.input, width: 100, padding: "5px 10px",
                    fontFamily: theme.fontMono, textAlign: "center", letterSpacing: "0.15em", fontSize: 12,
                    borderColor: emptyPwError ? theme.red : theme.border,
                  }}
                  placeholder="•••"
                  value={emptyPw}
                  onChange={(e) => { setEmptyPw(e.target.value); setEmptyPwError(false); }}
                  onKeyDown={(e) => e.key === "Enter" && emptyTrash()}
                  autoFocus
                />
                {emptyPwError && (
                  <div style={{ fontSize: 10, color: theme.red, position: "absolute", top: "100%", left: 0, marginTop: 1, whiteSpace: "nowrap" }}>Falsches Passwort</div>
                )}
              </div>
              <button style={{ ...css.btn("danger"), padding: "5px 12px", fontSize: 12 }} onClick={emptyTrash}>
                Bestätigen
              </button>
              <button style={{ ...css.btn("ghost"), padding: "5px 8px", fontSize: 12 }} onClick={() => { setConfirmEmpty(false); setEmptyPw(""); setEmptyPwError(false); }}>
                Abbrechen
              </button>
            </div>
          ) : (
            <button style={{ ...css.btn("ghost"), color: theme.red, borderColor: theme.red + "33" }} onClick={() => setConfirmEmpty(true)}>
              <Icon type="trash" size={14} /> Papierkorb leeren
            </button>
          )
        )}
      </div>

      {/* Bulk actions */}
      {selected.size > 0 && (
        <div style={{
          display: "flex", alignItems: "center", gap: 10, padding: "10px 16px", marginBottom: 12,
          background: theme.accentGlow, border: `1px solid ${theme.accent}33`, borderRadius: theme.radius,
        }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: theme.accent }}>{selected.size} ausgewählt</span>
          <div style={{ flex: 1 }} />
          <button style={{ ...css.btn("primary"), padding: "5px 12px" }} onClick={restoreSelected}>
            <Icon type="upload" size={13} /> Wiederherstellen ({selected.size})
          </button>
          {confirmBulkDelete ? (
            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
              <span style={{ fontSize: 11, color: theme.red }}>Passwort:</span>
              <div style={{ position: "relative" }}>
                <input
                  type="password"
                  style={{
                    ...css.input, width: 90, padding: "4px 8px",
                    fontFamily: theme.fontMono, textAlign: "center", letterSpacing: "0.15em", fontSize: 11,
                    borderColor: bulkDeletePwError ? theme.red : theme.border,
                  }}
                  placeholder="•••"
                  value={bulkDeletePw}
                  onChange={(e) => { setBulkDeletePw(e.target.value); setBulkDeletePwError(false); }}
                  onKeyDown={(e) => e.key === "Enter" && permanentDeleteSelected()}
                  autoFocus
                />
                {bulkDeletePwError && (
                  <div style={{ fontSize: 10, color: theme.red, position: "absolute", top: "100%", left: 0, marginTop: 1, whiteSpace: "nowrap" }}>Falsch</div>
                )}
              </div>
              <button style={{ ...css.btn("danger"), padding: "4px 10px", fontSize: 11 }} onClick={permanentDeleteSelected}>
                <Icon type="check" size={12} />
              </button>
              <button style={{ ...css.btn("ghost"), padding: "4px 6px", fontSize: 11 }} onClick={() => { setConfirmBulkDelete(false); setBulkDeletePw(""); setBulkDeletePwError(false); }}>
                <Icon type="x" size={12} />
              </button>
            </div>
          ) : (
            <button style={{ ...css.btn("ghost"), padding: "5px 12px", color: theme.red, borderColor: theme.red + "33" }} onClick={() => setConfirmBulkDelete(true)}>
              <Icon type="x" size={13} /> Endgültig löschen
            </button>
          )}
          <button style={{ ...css.btn("ghost"), padding: "5px 8px" }} onClick={() => setSelected(new Set())}>
            <Icon type="x" size={13} />
          </button>
        </div>
      )}

      {trash.length > 0 ? (
        <div style={css.card}>
          <table style={css.table}>
            <thead>
              <tr>
                <th style={{ ...css.th, width: 36 }}>
                  <input type="checkbox" checked={allSelected} onChange={toggleSelectAll} style={{ accentColor: theme.accent, cursor: "pointer" }} />
                </th>
                <th style={css.th}>Produkt</th>
                <th style={css.th}>Preisliste</th>
                <th style={css.th}>Kategorie</th>
                <th style={{ ...css.th, textAlign: "right" }}>EK-Preis</th>
                <th style={css.th}>Gelöscht am</th>
                <th style={{ ...css.th, textAlign: "right" }}>Aktionen</th>
              </tr>
            </thead>
            <tbody>
              {trash.map((p) => (
                <tr key={p.id} style={{ background: selected.has(p.id) ? theme.accentGlow : "transparent", opacity: 0.85 }}>
                  <td style={{ ...css.td, width: 36 }}>
                    <input type="checkbox" checked={selected.has(p.id)} onChange={() => toggleSelect(p.id)} style={{ accentColor: theme.accent, cursor: "pointer" }} />
                  </td>
                  <td style={{ ...css.td, fontWeight: 500 }}>{p.name}</td>
                  <td style={css.td}>
                    {p.supplierId ? <span style={css.badge(getSupplierColor(p.supplierId))}>{getSupplierName(p.supplierId)}</span> : "–"}
                  </td>
                  <td style={css.td}>{p.category ? <span style={css.badge(theme.accent)}>{p.category}</span> : "–"}</td>
                  <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono, fontWeight: 600 }}>{fmt(p.ek)}</td>
                  <td style={{ ...css.td, fontSize: 12, color: theme.textMuted }}>{formatDate(p.deletedAt)}</td>
                  <td style={{ ...css.td, textAlign: "right" }}>
                    <button style={{ ...css.btn("ghost"), padding: "4px 8px", color: theme.green }} onClick={() => restoreOne(p)}>
                      <Icon type="upload" size={13} />
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ) : (
        <div style={{ ...css.card, ...css.emptyState }}>
          <Icon type="check" size={32} />
          <div style={{ marginTop: 12, fontSize: 15, fontWeight: 500 }}>Papierkorb ist leer</div>
          <div style={{ fontSize: 13, marginTop: 4, color: theme.textDim }}>Gelöschte Produkte erscheinen hier.</div>
        </div>
      )}
    </div>
  );
}
