const readExcelFile = (arrayBuffer) => {
  const lib = (typeof SheetJS !== 'undefined' && SheetJS) || (typeof window !== 'undefined' && window.XLSX) || null;
  if (!lib || typeof lib.read !== 'function') throw new Error("Excel-Bibliothek nicht geladen. Bitte verwende stattdessen das CSV-Format.");
  const wb = lib.read(new Uint8Array(arrayBuffer), { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  return lib.utils.sheet_to_json(ws, { header: 1, defval: "" });
};

const calcSellingPrice = (ekPerUnit, quantity, shipping, packaging, provision, fixedFee, margin, mwstRate = 19) => {
  // All inputs are Netto. Marketplace charges provision on Brutto,
  // but MwSt on provision is reclaimable (Vorsteuer), so effective Netto rate = same %.
  // FixedFee from marketplace is Brutto -> convert to Netto.
  const ekTotal = ekPerUnit * quantity;
  const fixedFeeNetto = fixedFee / (1 + mwstRate / 100);
  const totalCostsNetto = ekTotal + shipping + packaging + fixedFeeNetto;
  const divisor = 1 - provision / 100;
  if (divisor <= 0) return null;
  const vkNetto = totalCostsNetto * (1 + margin / 100) / divisor;
  const vkBrutto = vkNetto * (1 + mwstRate / 100);
  const provisionNetto = vkNetto * (provision / 100);
  const mwstAmount = vkBrutto - vkNetto;
  const nettoGewinn = vkNetto - ekTotal - shipping - packaging - provisionNetto - fixedFeeNetto;
  return {
    vkNetto: Math.round(vkNetto * 100) / 100,
    vkBrutto: Math.round(vkBrutto * 100) / 100,
    ekTotal,
    provisionNetto: Math.round(provisionNetto * 100) / 100,
    provisionBrutto: Math.round(provisionNetto * (1 + mwstRate / 100) * 100) / 100,
    fixedFeeNetto: Math.round(fixedFeeNetto * 100) / 100,
    mwstAmount: Math.round(mwstAmount * 100) / 100,
    nettoGewinn: Math.round(nettoGewinn * 100) / 100,
    totalCostsNetto: Math.round(totalCostsNetto * 100) / 100,
    marginReal: vkNetto > 0 ? Math.round((nettoGewinn / vkNetto) * 10000) / 100 : 0,
    gewinnProStueck: quantity > 0 ? Math.round((nettoGewinn / quantity) * 100) / 100 : 0,
  };
};

// ─── Storage Hook ───────────────────────────────────────────
const useStorage = (key, defaultVal) => {
  const [data, setData] = useState(defaultVal);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const result = (() => { const v = localStorage.getItem(key); return v ? { value: v } : null; })();
        if (result && result.value) {
          setData(JSON.parse(result.value));
        }
      } catch (e) {
        // key doesn't exist, use default
      }
      setLoaded(true);
    })();
  }, [key]);

  const save = useCallback(async (newData) => {
    setData(newData);
    try {
      localStorage.setItem(key, JSON.stringify(newData));
      if (key.startsWith("pk_")) autoSaveToGist();
    } catch (e) {
      console.error("Storage save error:", e);
    }
  }, [key]);

  // Direct state setter that doesn't write to storage (for when caller manages storage themselves)
  const setDataOnly = useCallback((newData) => {
    setData(newData);
  }, []);

  return [data, save, loaded, setDataOnly];
};

// ─── GIST AUTO-SYNC SYSTEM ──────────────────────────────────
const GIST_DATA_KEYS = ["pk_products","pk_marketplaces","pk_shipping","pk_packaging","pk_suppliers","pk_trash","pk_logs","pk_admin_password","pk_snapshots"];

// Global auto-save debounce
let _gistSaveTimer = null;
let _gistSaving = false;
const _gistListeners = [];
const onSyncStatusChange = (fn) => { _gistListeners.push(fn); };
const notifySyncStatus = (s) => { _gistListeners.forEach(fn => fn(s)); };

const autoSaveToGist = () => {
  const token = localStorage.getItem("pk_gh_token");
  const gistId = localStorage.getItem("pk_gh_gist");
  if (!token || !gistId) return;
  if (_gistSaveTimer) clearTimeout(_gistSaveTimer);
  _gistSaveTimer = setTimeout(async () => {
    if (_gistSaving) return;
    _gistSaving = true;
    notifySyncStatus("saving");
    try {
      const d = { _sync: true, _date: new Date().toISOString(), _version: "3.4" };
      GIST_DATA_KEYS.forEach(k => { try { const v = localStorage.getItem(k); if (v) d[k] = JSON.parse(v); } catch(e) {} });
      const res = await fetch("https://api.github.com/gists/" + gistId, {
        method: "PATCH",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ files: { "preiskalkulator-data.json": { content: JSON.stringify(d) } } })
      });
      if (!res.ok) throw new Error(res.status);
      localStorage.setItem("pk_gh_lastsync", new Date().toISOString());
      notifySyncStatus("saved");
      setTimeout(() => notifySyncStatus(null), 2000);
    } catch(e) {
      console.error("Auto-save Fehler:", e);
      notifySyncStatus("error");
      setTimeout(() => notifySyncStatus(null), 4000);
    }
    _gistSaving = false;
  }, 3000); // 3 Sekunden Debounce
};

function GistBootloader() {
  const [ready, setReady] = useState(false);
  const [status, setStatus] = useState("Lade Daten...");

  useEffect(() => {
    const token = localStorage.getItem("pk_gh_token");
    const gistId = localStorage.getItem("pk_gh_gist");
    if (!token || !gistId) { setReady(true); return; }
    // Skip load if we just restored data locally (flag set by restore functions)
    const skipLoad = localStorage.getItem("pk_gh_skip_load");
    if (skipLoad) { localStorage.removeItem("pk_gh_skip_load"); setReady(true); return; }
    setStatus("Lade Daten von GitHub...");
    fetch("https://api.github.com/gists/" + gistId, { headers: { "Authorization": "Bearer " + token } })
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        const file = data.files && data.files["preiskalkulator-data.json"];
        if (file) {
          const imported = JSON.parse(file.content);
          GIST_DATA_KEYS.forEach(k => { if (imported[k] !== undefined) localStorage.setItem(k, JSON.stringify(imported[k])); });
          localStorage.setItem("pk_gh_lastsync", new Date().toISOString());
          console.log("Daten von GitHub geladen");
        }
        setReady(true);
      })
      .catch(e => {
        console.error("Gist laden fehlgeschlagen:", e);
        setStatus("Offline-Modus (lokale Daten)");
        setTimeout(() => setReady(true), 1000);
      });
  }, []);

  if (!ready) {
    return React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: "#0F1117", color: "#E8ECF4", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" } },
      React.createElement("div", { style: { fontSize: 28, fontWeight: 800, marginBottom: 16 } }, React.createElement("span", { style: { color: "#3B82F6" } }, "◆"), " Preiskalkulator"),
      React.createElement("div", { style: { color: "#8B92A8", fontSize: 14, marginBottom: 24 } }, status),
      React.createElement("div", { style: { width: 40, height: 40, border: "3px solid #2A2F40", borderTopColor: "#3B82F6", borderRadius: "50%", animation: "spin 1s linear infinite" } }),
      React.createElement("style", null, "@keyframes spin { to { transform: rotate(360deg); } }")
    );
  }

  return React.createElement(PreisKalkulator);
}

function PreisKalkulator() {
  const [authenticated, setAuthenticated] = useState(false);

        if (result && result.value) {
          setStoredPassword(JSON.parse(result.value));

        }

      }

  if (!authenticated) {
    return (
      <div style={{
        ...css.app,
        display: "flex", alignItems: "center", justifyContent: "center", height: "100vh",
        background: `linear-gradient(145deg, ${theme.bg} 0%, #131620 50%, ${theme.bg} 100%)`,
      }}>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <style>{`
          @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
          @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        `}</style>
        <div style={{
          width: 380, padding: 36,
          background: theme.card,
          border: `1px solid ${theme.border}`,
          borderRadius: 16,

          animation: "fadeIn 0.4s ease-out",
        }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{
              width: 56, height: 56, borderRadius: 14,
              background: theme.accentGlow,
              border: `1px solid ${theme.accent}33`,
              display: "flex", alignItems: "center", justifyContent: "center",
              margin: "0 auto 16px",

            }}>
              <span style={{ color: theme.accent }}>◆</span>
            </div>
            <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: "-0.02em" }}>Preiskalkulator</div>
            <div style={{ fontSize: 13, color: theme.textMuted, marginTop: 4 }}>Passwort eingeben um fortzufahren</div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <label style={css.label}>Passwort</label>
            <div style={{ animation: loginShake ? "shake 0.4s ease-in-out" : "none" }}>
              <input
                type="password"
                style={{
                  ...css.input,
                  padding: "12px 16px",
                  fontSize: 16,
                  textAlign: "center",
                  letterSpacing: "0.2em",
                  fontFamily: theme.fontMono,
                  borderColor: loginError ? theme.red : theme.border,
                }}
                value={loginPw}
                onChange={(e) => { setLoginPw(e.target.value); setLoginError(false); }}
                onKeyDown={(e) => e.key === "Enter" && handleLogin()}
                placeholder="•••"
                autoFocus
              />

            {loginError && (

  return <PreisKalkulatorApp appPassword={currentPassword} setAppPassword={async (pw) => {

  var saveSnapshot = function(note) {
    var keys = ["pk_products","pk_marketplaces","pk_shipping","pk_packaging","pk_suppliers","pk_trash","pk_logs"];
    var data = {};

    var prods = data.pk_products || []; var supps = data.pk_suppliers || [];
    var snap = { id: Date.now(), date: new Date().toISOString(), note: note || "", productCount: prods.length, supplierCount: supps.length, data: data };
    var all = getSnapshots(); all.unshift(snap);

    try { localStorage.setItem("pk_snapshots", JSON.stringify(all)); } catch(e) { alert("Speicher voll! Alte Snapshots loeschen."); }
    setSnapRefresh(Date.now());
  };
  var restoreSnapshot = function(snap) {
    if (!confirm("Aktuellen Stand ueberschreiben und zu dieser Version zurueckkehren?")) return;

  };

            </button>
            <button style={{ padding: "6px 14px", borderRadius: 6, border: "1px solid #a78bfa33", background: "#a78bfa12", color: "#a78bfa", fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: theme.font, position: "relative" }} onClick={() => setShowSyncModal(true)} title="GitHub Cloud Sync">
              <Icon type="store" size={13} /> {autoSyncStatus === "saving" ? "⏳ Speichert..." : autoSyncStatus === "saved" ? "✓ Gespeichert" : autoSyncStatus === "error" ? "⚠ Fehler" : syncStatus === "uploading" ? "⏳" : syncStatus === "downloading" ? "⏳" : syncStatus === "success" ? "✓" : "☁"}{!autoSyncStatus && " Sync"}
              {ghToken && gistId && <span style={{ width: 6, height: 6, borderRadius: "50%", background: autoSyncStatus === "error" ? "#ef4444" : autoSyncStatus === "saving" ? "#f59e0b" : "#22c55e", position: "absolute", top: 4, right: 4 }} />}
            </button>
          </div>
        </div>
      </div>
      {showSnapshots && (
        <div style={{ background: theme.card, border: "1px solid " + theme.border, borderRadius: 10, margin: "0 16px 8px", padding: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>Versionen / Snapshots</div>
            <button style={{ background: "none", border: "none", color: theme.textMuted, cursor: "pointer", fontSize: 18, padding: "2px 8px" }} onClick={() => setShowSnapshots(false)}>{"✕"}</button>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            <button style={{ ...css.btn("primary"), fontSize: 13 }} onClick={() => { var note = prompt("Beschreibung (optional):", ""); if (note === null) return; saveSnapshot(note); }}>
              <Icon type="check" size={14} /> Aktuellen Stand speichern
            </button>
          </div>
          <div style={{ fontSize: 12, color: theme.textMuted, marginBottom: 10 }}>Klicke "Laden" um zu einem alten Stand zurueckzukehren:</div>
          {getSnapshots().length === 0 ? (
            <div style={{ padding: 16, textAlign: "center", color: theme.textMuted, fontSize: 13, background: theme.surface, borderRadius: 8 }}>Noch keine Snapshots gespeichert.</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 300, overflowY: "auto" }}>
              {getSnapshots().map(function(snap) {
                var d = new Date(snap.date);
                var ds = d.toLocaleDateString("de-DE") + " " + d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
                return (
                  <div key={snap.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 12px", background: theme.surface, borderRadius: 8, border: "1px solid " + theme.border }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{ds}</div>
                      <div style={{ fontSize: 11, color: theme.textMuted, marginTop: 2 }}>{snap.productCount} Produkte, {snap.supplierCount} Preislisten{snap.note ? " | " + snap.note : ""}</div>
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button style={{ padding: "4px 10px", borderRadius: 5, border: "1px solid " + theme.accent + "33", background: theme.accent + "15", color: theme.accent, fontSize: 11, fontWeight: 600, cursor: "pointer" }} onClick={() => restoreSnapshot(snap)}>Laden</button>
                      <button style={{ padding: "4px 8px", borderRadius: 5, border: "1px solid " + theme.red + "33", background: theme.red + "15", color: theme.red, fontSize: 11, cursor: "pointer" }} onClick={() => deleteSnapshot(snap.id)}>{"✕"}</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
      {showSyncModal && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.7)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }} onClick={(e) => { if (e.target === e.currentTarget) setShowSyncModal(false); }}>
          <div style={{ background: theme.card, borderRadius: 14, padding: 24, maxWidth: 500, width: "100%", border: "1px solid " + theme.border, maxHeight: "90vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 17, color: "#a78bfa" }}>{"☁"} GitHub Cloud Sync</div>
              <button style={{ background: "none", border: "none", color: theme.textMuted, cursor: "pointer", fontSize: 20, padding: "2px 8px" }} onClick={() => setShowSyncModal(false)}>{"✕"}</button>
            </div>
            <div style={{ fontSize: 13, color: theme.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
              Deine Daten werden automatisch in einem privaten GitHub Gist gespeichert. Beim Öffnen der App werden die Daten automatisch geladen — funktioniert auf allen Geräten.
            </div>
            <div style={{ background: theme.surface, borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 8 }}>Einrichtung</div>
              <div style={{ fontSize: 12, color: theme.textMuted, marginBottom: 12, lineHeight: 1.5 }}>
                1. Gehe zu <span style={{ color: theme.accent, cursor: "pointer", textDecoration: "underline" }} onClick={() => window.open("https://github.com/settings/tokens/new?scopes=gist&description=WSK-Preiskalkulator", "_blank")}>github.com/settings/tokens</span><br/>
                2. Erstelle einen Token mit <strong>gist</strong> Berechtigung<br/>
                3. Kopiere den Token hier rein
              </div>
              <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 4 }}>Personal Access Token</label>
              <input type="password" value={ghToken} onChange={(e) => { setGhToken(e.target.value); saveGhSettings(e.target.value, gistId); }} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1px solid " + theme.border, background: theme.bg, color: theme.text, fontSize: 13, fontFamily: "monospace", boxSizing: "border-box" }} />
              <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 4, marginTop: 12 }}>Gist ID <span style={{ fontWeight: 400, color: theme.textMuted }}>(wird automatisch erstellt beim ersten Upload)</span></label>
              <input type="text" value={gistId} onChange={(e) => { setGistId(e.target.value); saveGhSettings(ghToken, e.target.value); }} placeholder="Wird automatisch gesetzt..." style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1px solid " + theme.border, background: theme.bg, color: theme.text, fontSize: 13, fontFamily: "monospace", boxSizing: "border-box" }} />
            </div>
            {lastSync && (
              <div style={{ fontSize: 12, color: theme.textMuted, marginBottom: 12, textAlign: "center" }}>
                Letzter Sync: {new Date(lastSync).toLocaleDateString("de-DE")} {new Date(lastSync).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })}
              </div>
            )}
            {syncStatus && (
              <div style={{ padding: "10px 14px", borderRadius: 8, marginBottom: 12, fontSize: 13, fontWeight: 600, textAlign: "center", background: syncStatus === "error" ? theme.red + "15" : syncStatus === "success" ? theme.green + "15" : theme.accent + "15", color: syncStatus === "error" ? theme.red : syncStatus === "success" ? theme.green : theme.accent }}>
                {syncMsg}
              </div>
            )}
            <div style={{ display: "flex", gap: 10 }}>
              <button style={{ flex: 1, padding: "12px 16px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #a78bfa, #7c3aed)", color: "#fff", fontSize: 14, fontWeight: 700, cursor: ghToken ? "pointer" : "not-allowed", opacity: ghToken ? 1 : 0.5, fontFamily: theme.font }} disabled={!ghToken || syncStatus === "uploading" || syncStatus === "downloading"} onClick={pushToGist}>
                {"⬆"} Upload (Speichern)
              </button>
              <button style={{ flex: 1, padding: "12px 16px", borderRadius: 10, border: "1px solid #a78bfa33", background: "#a78bfa12", color: "#a78bfa", fontSize: 14, fontWeight: 700, cursor: ghToken && gistId ? "pointer" : "not-allowed", opacity: ghToken && gistId ? 1 : 0.5, fontFamily: theme.font }} disabled={!ghToken || !gistId || syncStatus === "uploading" || syncStatus === "downloading"} onClick={pullFromGist}>
                {"⬇"} Download (Laden)
              </button>
            </div>
            {gistId && (
              <div style={{ marginTop: 14, textAlign: "center" }}>
                <span style={{ fontSize: 12, color: theme.accent, cursor: "pointer", textDecoration: "underline" }} onClick={() => window.open("https://gist.github.com/" + gistId, "_blank")}>Gist auf GitHub ansehen</span>
              </div>
            )}
            <div style={{ marginTop: 16, padding: 12, background: theme.surface, borderRadius: 8, fontSize: 11, color: theme.textMuted, lineHeight: 1.5 }}>
              <strong>So funktioniert's:</strong> Alle Änderungen werden <strong>automatisch</strong> in der Cloud gespeichert (3 Sek. nach jeder Änderung). Beim Öffnen der App werden die Daten automatisch von GitHub geladen. Auf einem neuen Gerät einfach Token + Gist ID eingeben — fertig!
            </div>
          </div>
        </div>
      )}
      <div style={css.tabs}>
        {tabs.map((t) => (
          <button key={t.id} style={css.tab(activeTab === t.id)} onClick={() => setActiveTab(t.id)}>
            <Icon type={t.icon} size={15} /> {t.label}
          </button>
        ))}
      </div>
      <div style={css.content}>
        {activeTab === "kalkulator" && (
          <KalkulatorTab products={products} marketplaces={marketplaces} shippingOptions={shippingOptions} packagingOptions={packagingOptions} suppliers={suppliers} />
        )}
        {activeTab === "produkte" && <ProdukteTab products={products} setProducts={setProducts} suppliers={suppliers} setSuppliers={setSuppliers} trash={trash} setTrash={setTrash} addLog={addLog} />}
        {activeTab === "preislisten" && <PreislistenTab suppliers={suppliers} setSuppliers={setSuppliers} products={products} setProducts={setProducts} addLog={addLog} />}
        {activeTab === "marktplaetze" && <MarktplaetzeTab marketplaces={marketplaces} setMarketplaces={setMarketplaces} />}
        {activeTab === "versand" && <VersandTab shippingOptions={shippingOptions} setShippingOptions={setShippingOptions} packagingOptions={packagingOptions} setPackagingOptions={setPackagingOptions} />}
        {activeTab === "papierkorb" && <PapierkorbTab trash={trash} setTrash={setTrash} products={products} setProducts={setProducts} suppliers={suppliers} addLog={addLog} appPassword={appPassword} />}
        {activeTab === "log" && <LogTab logs={logs} setLogs={setLogs} appPassword={appPassword} />}
        {activeTab === "admin" && <AdminTab appPassword={appPassword} setAppPassword={setAppPassword} products={products} setProducts={setProducts} suppliers={suppliers} setSuppliers={setSuppliers} marketplaces={marketplaces} setMarketplaces={setMarketplaces} shippingOptions={shippingOptions} setShippingOptions={setShippingOptions} packagingOptions={packagingOptions} setPackagingOptions={setPackagingOptions} trash={trash} setTrash={setTrash} logs={logs} setLogs={setLogs} addLog={addLog} />}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TAB: KALKULATOR
// ═══════════════════════════════════════════════════════════
function KalkulatorTab({ products, marketplaces, shippingOptions, packagingOptions, suppliers }) {
  const [search, setSearch] = useState("");
  const [cart, setCart] = useState([]);
  const [manualItems, setManualItems] = useState([]);
  const [selectedShipping, setSelectedShipping] = useState(shippingOptions[1]?.id || "");
  const [selectedPackaging, setSelectedPackaging] = useState([]);
  const [targetMargin, setTargetMargin] = useState("5");
  const [catOverrides, setCatOverrides] = useState({});
  const getCatProv = (mp) => { var ov = catOverrides[mp.id]; if (ov && mp.categories) { var cat = mp.categories.find(c => c.name === ov); if (cat) return cat.provision; } return mp.provision; };
  const [showSearch, setShowSearch] = useState(false);
  const [filterSupplier, setFilterSupplier] = useState("");
  const [showManual, setShowManual] = useState(false);
  const [manualForm, setManualForm] = useState({ name: "", ek: "", mwst: "19" });

  const activeMarketplaces = marketplaces.filter((m) => m.active);
  const getSupplierName = (id) => suppliers.find((s) => s.id === id)?.name || "";
  const getSupplierColor = (id) => suppliers.find((s) => s.id === id)?.color || theme.textMuted;
  const getMwstRate = (id) => MWST_RATES.find((r) => r.id === id)?.rate || 19;

  const filteredProducts = useMemo(() => {
    if (!search.trim() && !filterSupplier) return [];
    let results = products;
    if (filterSupplier) results = results.filter((p) => p.supplierId === filterSupplier);
    if (search.trim()) {
      const q = search.toLowerCase();
      results = results.filter((p) =>
        p.name.toLowerCase().includes(q) || p.sku?.toLowerCase().includes(q) ||
        p.ean?.includes(q) || p.pzn?.includes(q) ||
        getSupplierName(p.supplierId).toLowerCase().includes(q)
      );
    }
    return results.slice(0, 12);
  }, [search, filterSupplier, products, suppliers]);

  const [lastAdded, setLastAdded] = useState(null);

  const addToCart = (p) => {
    const ex = cart.find((c) => c.productId === p.id);
    if (ex) setCart(cart.map((c) => c.productId === p.id ? { ...c, qty: c.qty + 1 } : c));
    else setCart([...cart, { productId: p.id, product: p, qty: 1, mwst: p.mwst || "19" }]);
    setLastAdded(p.id); setTimeout(() => setLastAdded(null), 1200);
    setSearch("");
    setTimeout(() => { const el = document.getElementById("kalk-search"); if (el) el.focus(); }, 50);
  };
  const updateCartQty = (pid, qty) => qty <= 0
    ? setCart(cart.filter((c) => c.productId !== pid))
    : setCart(cart.map((c) => c.productId === pid ? { ...c, qty } : c));
  const updateCartMwst = (pid, mwst) => setCart(cart.map((c) => c.productId === pid ? { ...c, mwst } : c));
  const removeFromCart = (pid) => setCart(cart.filter((c) => c.productId !== pid));

  const addManualItem = () => {
    if (!manualForm.name || !manualForm.ek) return;
    const ek = parseFloat(manualForm.ek.replace(",", "."));
    if (isNaN(ek) || ek <= 0) return;
    setManualItems([...manualItems, { id: uid(), name: manualForm.name, ek, qty: 1, mwst: manualForm.mwst }]);
    setManualForm({ name: "", ek: "", mwst: "19" }); setShowManual(false);
  };
  const updateManualQty = (id, qty) => qty <= 0
    ? setManualItems(manualItems.filter((m) => m.id !== id))
    : setManualItems(manualItems.map((m) => m.id === id ? { ...m, qty } : m));
  const updateManualMwst = (id, mwst) => setManualItems(manualItems.map((m) => m.id === id ? { ...m, mwst } : m));
  const removeManualItem = (id) => setManualItems(manualItems.filter((m) => m.id !== id));

  const allItems = [
    ...cart.map((c) => ({ id: c.productId, name: c.product.name, ek: c.product.ek, qty: c.qty, mwst: c.mwst, pzn: c.product.pzn, sku: c.product.sku, supplierId: c.product.supplierId, isManual: false })),
    ...manualItems.map((m) => ({ id: m.id, name: m.name, ek: m.ek, qty: m.qty, mwst: m.mwst, pzn: "", sku: "", supplierId: "", isManual: true })),
  ];

  const totalItems = allItems.reduce((s, i) => s + i.qty, 0);
  const totalEkNetto = allItems.reduce((s, i) => s + i.ek * i.qty, 0);
  const shippingCost = shippingOptions.find((s) => s.id === selectedShipping)?.cost || 0;
  const packagingCost = selectedPackaging.reduce((sum, id) => {
    const p = packagingOptions.find((o) => o.id === id);
    return sum + (p ? p.cost : 0);
  }, 0);
  const margin = parseFloat(targetMargin) || 0;
  const sharedCosts = shippingCost + packagingCost;

  const calculations = activeMarketplaces.map((mp) => {
    if (allItems.length === 0) return { ...mp, result: null };
    const prov = getCatProv(mp);
    const divisor = 1 - prov / 100;
    if (divisor <= 0) return { ...mp, result: null };
    const calcWithFee = (fee) => {
      const fixFeeNetto = fee / 1.19;
      const itemResults = allItems.map((item) => {
        const ekItem = item.ek * item.qty;
        const costShare = totalEkNetto > 0 ? (ekItem / totalEkNetto) * (sharedCosts + fixFeeNetto) : 0;
        const vkNetto = (ekItem + costShare) * (1 + margin / 100) / divisor;
        const mwstRate = getMwstRate(item.mwst);
        const vkBrutto = vkNetto * (1 + mwstRate / 100);
        const provNetto = vkNetto * (prov / 100);
        const gewinn = vkNetto - ekItem - costShare - provNetto;
        return { ...item, mwstRate, vkNetto: Math.round(vkNetto*100)/100, vkBrutto: Math.round(vkBrutto*100)/100, mwstAmount: Math.round((vkBrutto-vkNetto)*100)/100, provNetto: Math.round(provNetto*100)/100, gewinn: Math.round(gewinn*100)/100, gewinnProStueck: item.qty > 0 ? Math.round((gewinn/item.qty)*100)/100 : 0 };
      });
      return itemResults;
    };
    var itemResults = calcWithFee(mp.fixedFee);
    if (mp.fixedFeeLow && mp.fixedFeeThreshold) {
      const testBrutto = itemResults.reduce((s,i) => s + i.vkBrutto, 0);
      const useFee = testBrutto < mp.fixedFeeThreshold ? mp.fixedFeeLow : mp.fixedFee;
      if (useFee !== mp.fixedFee) itemResults = calcWithFee(useFee);
    }
    const t = (f) => Math.round(itemResults.reduce((s,i) => s + i[f], 0)*100)/100;
    const tvn = t("vkNetto"); const tg = t("gewinn");
    return { ...mp, result: { items: itemResults, totalVkBrutto: t("vkBrutto"), totalVkNetto: tvn, totalMwst: t("mwstAmount"), totalProv: t("provNetto"), totalGewinn: tg, realMargin: tvn > 0 ? Math.round((tg/tvn)*10000)/100 : 0 } };
  });

  return (
    <div>
      <div style={css.card}>
        <div style={css.cardTitle}><Icon type="tag" size={16} /> Paket zusammenstellen</div>
        <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
          {suppliers.length > 0 && (
            <Field label="Preisliste">
              <select style={{ ...css.select, minWidth: 160 }} value={filterSupplier} onChange={(e) => { setFilterSupplier(e.target.value); setShowSearch(true); }}>
                <option value="">Alle Preislisten</option>
                {suppliers.map((s) => <option key={s.id} value={s.id}>{s.name} ({products.filter((p) => p.supplierId === s.id).length})</option>)}
              </select>
            </Field>
          )}
          <div style={{ position: "relative", flex: 1 }}>
            <Field label="Produkt suchen & hinzufügen">
              <div style={{ position: "relative" }}>
                <input id="kalk-search" style={css.input} placeholder="Name, SKU, EAN, PZN..." value={search} onChange={(e) => { setSearch(e.target.value); setShowSearch(true); }} onFocus={() => setShowSearch(true)} />
                <span style={{ position: "absolute", right: 10, top: 8, color: theme.textDim }}><Icon type="search" size={16} /></span>
              </div>
            </Field>
            {(showSearch || filterSupplier) && filteredProducts.length > 0 && (
              <div style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 50, background: theme.surface, border: `1px solid ${theme.border}`, borderRadius: theme.radiusSm, marginTop: 4, maxHeight: 300, overflow: "auto", boxShadow: "0 8px 32px rgba(0,0,0,0.4)" }}>
                {filteredProducts.map((p) => (
                  <div key={p.id} style={{ padding: "10px 14px", cursor: "pointer", borderBottom: `1px solid ${theme.border}`, transition: "background 0.1s" }}
                    onMouseEnter={(e) => e.currentTarget.style.background = theme.surfaceHover}
                    onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
                    onClick={() => addToCart(p)}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ fontWeight: 500 }}>{p.name}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 11, padding: "2px 6px", borderRadius: 4, background: (p.mwst === "7" ? theme.yellow : theme.textMuted) + "22", color: p.mwst === "7" ? theme.yellow : theme.textMuted }}>{getMwstRate(p.mwst || "19")}%</span>
                        <span style={{ fontFamily: theme.fontMono, fontWeight: 600, fontSize: 13 }}>{fmt(p.ek)}</span>
                      </div>
                    </div>
                    <div style={{ fontSize: 12, color: theme.textMuted, marginTop: 2, display: "flex", gap: 8, alignItems: "center" }}>
                      {p.supplierId && <span style={css.badge(getSupplierColor(p.supplierId))}>{getSupplierName(p.supplierId)}</span>}
                      {p.sku && <span>SKU: {p.sku}</span>}
                      {p.pzn && <span>PZN: {p.pzn}</span>}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "flex-end" }}>
            <button style={css.btn("ghost")} onClick={() => setShowManual(!showManual)}><Icon type="plus" size={14} /> Manuell</button>
          </div>
        </div>

        {showManual && (
          <div style={{ display: "flex", gap: 10, marginBottom: 14, padding: "12px 14px", background: theme.surface, borderRadius: theme.radiusSm, border: `1px solid ${theme.border}`, alignItems: "end" }}>
            <Field label="Bezeichnung"><input style={{ ...css.input, minWidth: 180 }} value={manualForm.name} onChange={(e) => setManualForm({ ...manualForm, name: e.target.value })} placeholder="Produktname..." /></Field>
            <Field label="EK Netto"><input style={{ ...css.input, width: 100, fontFamily: theme.fontMono }} value={manualForm.ek} onChange={(e) => setManualForm({ ...manualForm, ek: e.target.value })} placeholder="0.00" /></Field>
            <Field label="MwSt"><select style={{ ...css.select, width: 80 }} value={manualForm.mwst} onChange={(e) => setManualForm({ ...manualForm, mwst: e.target.value })}>{MWST_RATES.map((r) => <option key={r.id} value={r.id}>{r.rate}%</option>)}</select></Field>
            <button style={css.btn("primary")} onClick={addManualItem}><Icon type="plus" size={14} /></button>
            <button style={css.btn("ghost")} onClick={() => setShowManual(false)}><Icon type="x" size={14} /></button>
          </div>
        )}

        {allItems.length > 0 ? (
          <div style={{ border: `1px solid ${theme.border}`, borderRadius: theme.radiusSm, overflow: "hidden" }}>
            <table style={css.table}>
              <thead><tr>
                <th style={css.th}>Produkt</th>
                <th style={{ ...css.th, textAlign: "center", width: 80 }}>MwSt</th>
                <th style={{ ...css.th, textAlign: "right", width: 100 }}>EK Netto</th>
                <th style={{ ...css.th, textAlign: "center", width: 120 }}>Menge</th>
                <th style={{ ...css.th, textAlign: "right", width: 100 }}>Gesamt</th>
                <th style={{ ...css.th, width: 36 }}></th>
              </tr></thead>
              <tbody>
                {allItems.map((item) => (
                  <tr key={item.id}>
                    <td style={css.td}>
                      <div style={{ fontWeight: 500, fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>{item.name}{lastAdded === item.id && <span style={{ color: theme.green, fontSize: 11, fontWeight: 700, animation: "none" }}>✓ hinzugefügt</span>}</div>
                      <div style={{ fontSize: 11, color: theme.textMuted, display: "flex", gap: 6 }}>
                        {item.supplierId && <span style={css.badge(getSupplierColor(item.supplierId))}>{getSupplierName(item.supplierId)}</span>}
                        {item.pzn && <span>PZN: {item.pzn}</span>}
                      </div>
                    </td>
                    <td style={{ ...css.td, textAlign: "center" }}>

                        <button style={{ ...css.btn("ghost"), padding: "2px 8px", fontSize: 14, fontWeight: 700 }} onClick={() => item.isManual ? updateManualQty(item.id, item.qty+1) : updateCartQty(item.id, item.qty+1)}>+</button>

      {allItems.length > 0 && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 16 }}>

        <div style={css.card}>

            <div style={css.resultBox(theme.accent, theme.accentGlow)}><div style={css.resultValue(theme.accent)}>{fmt(shippingCost)}</div><div style={css.resultLabel}>Versand (1x)</div></div>

          </div>
          {calculations.map((c) => {
            const r = c.result;
            if (!r) return (<div key={c.id} style={{ padding: "12px 16px", marginBottom: 10, background: theme.surface, borderRadius: theme.radius, border: `1px solid ${theme.border}` }}><span style={css.badge(c.color)}>{c.name}</span><span style={{ marginLeft: 10, color: theme.red, fontSize: 13 }}>Nicht möglich</span></div>);

                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ width: 10, height: 10, borderRadius: 5, background: c.color }} />
                    <span style={{ fontSize: 16, fontWeight: 700 }}>{c.name}</span>
                    <span style={{ fontSize: 12, color: theme.textMuted }}>{fmtP(getCatProv(c))} Provision{c.fixedFee > 0 ? ` + ${c.fixedFeeLow && c.fixedFeeThreshold && r && r.totalVkBrutto < c.fixedFeeThreshold ? fmt(c.fixedFeeLow) : fmt(c.fixedFee)} Geb.` : ""}</span>

                  <div style={{ padding: "10px 18px", borderBottom: `1px solid ${theme.border}` }}>

                        <th style={{ ...css.th, fontSize: 10, textAlign: "right" }}>Gewinn</th>
                        <th style={{ ...css.th, fontSize: 10, textAlign: "right" }}>/ Stk.</th>
                      </tr></thead>
                      <tbody>{r.items.map((item) => (
                        <tr key={item.id}>
                          <td style={{ ...css.td, fontSize: 12 }}>{item.name} {item.qty > 1 && <span style={{ color: theme.textMuted }}>x{item.qty}</span>}</td>
                          <td style={{ ...css.td, textAlign: "center", fontSize: 12, color: item.mwstRate === 7 ? theme.yellow : theme.textMuted }}>{item.mwstRate}%</td>
                          <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono, fontSize: 12 }}>{fmt(item.vkNetto)}</td>
                          <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono, fontSize: 12, fontWeight: 600 }}>{fmt(item.vkBrutto)}</td>
                          <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono, fontSize: 12, color: item.gewinn >= 0 ? theme.green : theme.red }}>{fmt(item.gewinn)}</td>
                          <td style={{ ...css.td, textAlign: "right", fontFamily: theme.fontMono, fontSize: 11, color: theme.textMuted }}>{fmt(item.gewinnProStueck)}</td>
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                )}
                <div style={{ padding: "14px 18px" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 12 }}>
                    <div><div style={{ fontSize: 11, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 4 }}>VK Netto</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: theme.fontMono }}>{fmt(r.totalVkNetto)}</div></div>
                    <div><div style={{ fontSize: 11, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 4 }}>MwSt</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: theme.fontMono, color: theme.textMuted }}>{fmt(r.totalMwst)}</div></div>
                    <div><div style={{ fontSize: 11, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 4 }}>Provision Netto</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: theme.fontMono, color: theme.red }}>{"-"}{fmt(r.totalProv)}</div></div>
                    <div><div style={{ fontSize: 11, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 4 }}>EK Netto</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: theme.fontMono, color: theme.red }}>{"-"}{fmt(totalEkNetto)}</div></div>
                    <div><div style={{ fontSize: 11, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 4 }}>Versand+Verp.</div><div style={{ fontSize: 16, fontWeight: 700, fontFamily: theme.fontMono, color: theme.red }}>{"-"}{fmt(sharedCosts)}</div></div>
                    <div style={{ padding: "8px 12px", background: r.totalGewinn >= 0 ? theme.greenGlow : theme.redGlow, borderRadius: theme.radiusSm, border: `1px solid ${r.totalGewinn >= 0 ? theme.green + "33" : theme.red + "33"}` }}>
                      <div style={{ fontSize: 11, color: r.totalGewinn >= 0 ? theme.green : theme.red, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 4, fontWeight: 600 }}>Netto-Gewinn</div>
                      <div style={{ fontSize: 20, fontWeight: 800, fontFamily: theme.fontMono, color: r.totalGewinn >= 0 ? theme.green : theme.red }}>{fmt(r.totalGewinn)}</div>
                      <div style={{ fontSize: 11, color: theme.textMuted, marginTop: 2 }}>{fmtP(r.realMargin)} reale Marge</div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
          <div style={{ marginTop: 8, fontSize: 11, color: theme.textDim }}>
            Alle Beträge Netto. MwSt pro Artikel berücksichtigt. Versand & Verpackung 1x pro Sendung, anteilig nach EK verteilt. Fixgebühren Brutto→Netto.
          </div>
        </div>
      )}

      {allItems.length === 0 && (
        <div style={{ ...css.card, ...css.emptyState }}>
          <Icon type="calc" size={32} />
          <div style={{ marginTop: 12, fontSize: 15, fontWeight: 500 }}>Stelle oben ein Paket zusammen</div>
          <div style={{ fontSize: 12, marginTop: 4, maxWidth: 400, margin: "4px auto 0" }}>Mehrere Produkte in ein Paket. Versand nur 1x. MwSt (19%, 7%, 0%) pro Artikel korrekt berechnet.</div>
        </div>
      )}
    </div>
  );
}


// ═══════════════════════════════════════════════════════════
// TAB: PRODUKTE (Preisliste)
// ═══════════════════════════════════════════════════════════
function ProdukteTab({ products, setProducts, suppliers, setSuppliers, trash, setTrash, addLog }) {
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ name: "", sku: "", ean: "", pzn: "", ek: "", priceType: "netto", mwst: "19", category: "", supplierId: "" });
  const [importText, setImportText] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [importPreview, setImportPreview] = useState([]);
  const [importError, setImportError] = useState("");
  const [importSupplierId, setImportSupplierId] = useState("");
  const [importPriceType, setImportPriceType] = useState("netto");
  const [importMwst, setImportMwst] = useState("19");
  const [filterSupplier, setFilterSupplier] = useState("");
  const [filterCategory, setFilterCategory] = useState("");
  const [sortBy, setSortBy] = useState("name");
  const [sortDir, setSortDir] = useState("asc");
  const [selected, setSelected] = useState(new Set());
  const [showBulkMove, setShowBulkMove] = useState(false);
  const [bulkMoveTarget, setBulkMoveTarget] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false); // inline confirmation

  const categories = [...new Set(products.map((p) => p.category).filter(Boolean))].sort();
  const getSupplierName = (id) => suppliers.find((s) => s.id === id)?.name || "";
  const getSupplierColor = (id) => suppliers.find((s) => s.id === id)?.color || theme.textMuted;

  const filtered = useMemo(() => {
    let results = products;
    if (filterSupplier === "__none__") {
      results = results.filter((p) => !p.supplierId);
    } else if (filterSupplier) {
      results = results.filter((p) => p.supplierId === filterSupplier);
    }
    if (filterCategory) {
      results = results.filter((p) => p.category === filterCategory);
    }
    if (search.trim()) {
      const q = search.toLowerCase();
      results = results.filter(
        (p) => p.name.toLowerCase().includes(q) || p.sku?.toLowerCase().includes(q) || p.ean?.includes(q) || p.pzn?.includes(q) || p.category?.toLowerCase().includes(q) || getSupplierName(p.supplierId).toLowerCase().includes(q)
      );
    }
    // Sort
    results = [...results].sort((a, b) => {
      let va, vb;
      if (sortBy === "name") { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
      else if (sortBy === "ek") { va = a.ek; vb = b.ek; }
      else if (sortBy === "sku") { va = (a.sku || "").toLowerCase(); vb = (b.sku || "").toLowerCase(); }
      else if (sortBy === "category") { va = (a.category || "").toLowerCase(); vb = (b.category || "").toLowerCase(); }
      else if (sortBy === "supplier") { va = getSupplierName(a.supplierId).toLowerCase(); vb = getSupplierName(b.supplierId).toLowerCase(); }
      if (va < vb) return sortDir === "asc" ? -1 : 1;
      if (va > vb) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
    return results;
  }, [search, filterSupplier, filterCategory, sortBy, sortDir, products, suppliers]);

  const allFilteredSelected = filtered.length > 0 && filtered.every((p) => selected.has(p.id));
  const someSelected = selected.size > 0;

  const toggleSelect = (id) => {
    const next = new Set(selected);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelected(next);
  };

  const toggleSelectAll = () => {
    if (allFilteredSelected) {
      const next = new Set(selected);
      filtered.forEach((p) => next.delete(p.id));
      setSelected(next);
    } else {
      const next = new Set(selected);
      filtered.forEach((p) => next.add(p.id));
      setSelected(next);
    }
  };

  const bulkDelete = () => {
    const toDelete = products.filter((p) => selected.has(p.id));
    const trashItems = toDelete.map((p) => ({ ...p, deletedAt: new Date().toISOString() }));
    setTrash([...trash, ...trashItems]);
    setProducts(products.filter((p) => !selected.has(p.id)));
    addLog("Papierkorb", `${toDelete.length} Produkte in den Papierkorb verschoben`);
    setSelected(new Set());
    setConfirmDelete(false);
  };

  const bulkMoveToSupplier = () => {
    const count = selected.size;
    const targetName = suppliers.find((s) => s.id === bulkMoveTarget)?.name || "Keine";
    setProducts(products.map((p) => selected.has(p.id) ? { ...p, supplierId: bulkMoveTarget } : p));
    addLog("Zuordnung", `${count} Produkte → Preisliste "${targetName}"`);
    setSelected(new Set());
    setShowBulkMove(false);
    setBulkMoveTarget("");
  };

  const deleteProduct = (p) => {
    setTrash([...trash, { ...p, deletedAt: new Date().toISOString() }]);
    setProducts(products.filter((pr) => pr.id !== p.id));
    addLog("Papierkorb", `"${p.name}" in den Papierkorb verschoben`);
  };

  const handleSort = (col) => {
    if (sortBy === col) {
      setSortDir(sortDir === "asc" ? "desc" : "asc");
    } else {
      setSortBy(col);
      setSortDir("asc");
    }
  };

  const SortIcon = ({ col }) => {
    if (sortBy !== col) return <span style={{ color: theme.textDim, marginLeft: 4, fontSize: 10 }}>↕</span>;
    return <span style={{ color: theme.accent, marginLeft: 4, fontSize: 10 }}>{sortDir === "asc" ? "▲" : "▼"}</span>;
  };

  const resetForm = () => {
    setForm({ name: "", sku: "", ean: "", pzn: "", ek: "", priceType: "netto", mwst: "19", category: "", supplierId: "" });
    setEditId(null);
    setShowForm(false);
  };

  const saveProduct = () => {
    if (!form.name || !form.ek) return;
    let ekNetto = parseFloat(form.ek);
    // If price entered as brutto, convert to netto for storage
    if (form.priceType === "brutto" && ekNetto > 0) {
      const mwstRate = MWST_RATES.find((r) => r.id === form.mwst)?.rate || 19;
      ekNetto = bruttoToNetto(ekNetto, mwstRate);
    }
    const productData = { ...form, ek: Math.round(ekNetto * 100) / 100, ekNetto: Math.round(ekNetto * 100) / 100 };
    if (editId) {
      setProducts(products.map((p) => (p.id === editId ? { ...p, ...productData } : p)));
      addLog("Bearbeitet", `"${form.name}" aktualisiert`);
    } else {
      setProducts([...products, { id: uid(), ...productData }]);
      addLog("Hinzugefügt", `"${form.name}" (EK Netto: ${fmt(ekNetto)})`);
    }
    resetForm();
  };

  const startEdit = (p) => {
    setForm({
      name: p.name, sku: p.sku || "", ean: p.ean || "", pzn: p.pzn || "",
      ek: String(p.ek), priceType: "netto", mwst: p.mwst || "19",
      category: p.category || "", supplierId: p.supplierId || "",
    });
    setEditId(p.id);
    setShowForm(true);
  };

  const parseCSVText = (text) => {
    if (!text.trim()) return [];
    const lines = text.trim().split("\n");
    const parsed = [];
    for (const line of lines) {
      // Skip header lines
      const lower = line.toLowerCase();
      if (lower.startsWith("name;") || lower.startsWith("name,") || lower.startsWith("bezeichnung") || lower.startsWith("art")) continue;
      
      // Detect delimiter
      let parts;
      if (line.includes(";")) {
        parts = line.split(";").map((s) => s.trim());
      } else if (line.includes("\t")) {
        parts = line.split("\t").map((s) => s.trim());
      } else {
        parts = line.split(",").map((s) => s.trim());
      }
      
      if (parts.length >= 2) {
        const name = parts[0];
        const ek = parseFloat(parts[1]?.replace(",", "."));
        if (name && !isNaN(ek)) {
          parsed.push({
            id: uid(),
            name,
            sku: parts[2] || "",
            ean: parts[3] || "",
            ek,
            category: parts[4] || "",
            pzn: parts[5] || "",
          });
        }
      }
    }
    return parsed;
  };

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImportError("");
    const ext = file.name.split(".").pop().toLowerCase();
    
    if (["xlsx", "xls", "xlsm"].includes(ext)) {
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const json = readExcelFile(evt.target.result);
          if (json.length < 2) { setImportError("Datei enthält keine Daten."); return; }
          // Use first row as guide, auto-detect columns
          const rows = json.slice(1).filter((r) => r.some((c) => c !== ""));
          const parsed = rows.map((row) => {
            const name = String(row[0] || "").trim();
            const ek = parseFloat(String(row[1] || "").replace(",", "."));
            if (!name || isNaN(ek)) return null;
            return {
              id: uid(), name, ek,
              sku: String(row[2] || "").trim(),
              ean: String(row[3] || "").trim(),
              category: String(row[4] || "").trim(),
              pzn: String(row[5] || "").trim(),
            };
          }).filter(Boolean);
          if (parsed.length > 0) {
            setImportPreview(parsed);
            setImportText(`[Excel: ${file.name} — ${parsed.length} Zeilen]`);
          } else {
            setImportPreview([]);
            setImportError("Keine Produkte erkannt. Spaltenreihenfolge: Name, EK, SKU, EAN, Kategorie, PZN");
          }
        } catch (err) {
          setImportError("Fehler beim Lesen der Excel-Datei: " + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = (evt) => {
        const text = evt.target.result;
        setImportText(text);
        const parsed = parseCSVText(text);
        if (parsed.length > 0) {
          setImportPreview(parsed);
          setImportError("");
        } else {
          setImportPreview([]);
          setImportError("Keine Produkte erkannt. Prüfe das Format: Name;EK;SKU;EAN;Kategorie;PZN");
        }
      };
      reader.onerror = () => setImportError("Fehler beim Lesen der Datei.");
      reader.readAsText(file, "UTF-8");
    }
    // Reset file input so same file can be re-uploaded
    e.target.value = "";
  };

  const handleTextChange = (text) => {
    setImportText(text);
    setImportError("");
    if (text.trim().length > 10) {
      const parsed = parseCSVText(text);
      setImportPreview(parsed);
    } else {
      setImportPreview([]);
    }
  };

  const importCSV = () => {
    const toImport = importPreview.length > 0 ? importPreview : parseCSVText(importText);
    if (toImport.length > 0) {
      const mwstRate = MWST_RATES.find((r) => r.id === importMwst)?.rate || 19;
      const withMeta = toImport.map((p) => {
        let ekNetto = p.ek;
        // Convert brutto to netto if needed
        if (importPriceType === "brutto" && ekNetto > 0) {
          ekNetto = Math.round(bruttoToNetto(ekNetto, mwstRate) * 100) / 100;
        }
        return {
          ...p,
          ek: ekNetto,
          ekNetto: ekNetto,
          priceType: "netto",
          mwst: importMwst,
          supplierId: importSupplierId,
        };
      });
      setProducts([...products, ...withMeta]);
      const supplierName = suppliers.find((s) => s.id === importSupplierId)?.name || "Ohne Zuordnung";
      const priceNote = importPriceType === "brutto" ? ` (Brutto→Netto, ${mwstRate}% MwSt)` : " (Netto)";
      addLog("Import", `${toImport.length} Produkte importiert → "${supplierName}"${priceNote}`);
      setImportText("");
      setImportPreview([]);
      setShowImport(false);
      setImportError("");
      setImportSupplierId("");
      setImportPriceType("netto");
      setImportMwst("19");
    }
  };

  const exportCSV = () => {
    const header = "Name;EK Netto;SKU;EAN;Kategorie;PZN;Preisliste";
    const rows = (filterSupplier ? filtered : products).map((p) => 
      `${p.name};${p.ek};${p.sku || ""};${p.ean || ""};${p.category || ""};${p.pzn || ""};${getSupplierName(p.supplierId) || ""}`
    );
    const csv = [header, ...rows].join("\n");
    const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const suffix = filterSupplier ? `_${getSupplierName(filterSupplier)}` : "";
    a.download = `preisliste${suffix}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div>
      {/* Bulk Action Bar */}
      {someSelected && (
        <div style={{
          display: "flex", alignItems: "center", gap: 10, padding: "10px 16px", marginBottom: 12,
          background: theme.accentGlow, border: `1px solid ${theme.accent}33`, borderRadius: theme.radius,
        }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: theme.accent }}>
            {selected.size} ausgewählt
          </span>
          <div style={{ flex: 1 }} />
          {suppliers.length > 0 && (
            showBulkMove ? (
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <select style={{ ...css.select, width: "auto", minWidth: 140, padding: "5px 10px" }} value={bulkMoveTarget} onChange={(e) => setBulkMoveTarget(e.target.value)}>
                  <option value="">— Keine Zuordnung —</option>
                  {suppliers.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
                <button style={{ ...css.btn("primary"), padding: "5px 12px" }} onClick={bulkMoveToSupplier}>
                  <Icon type="check" size={13} /> Zuordnen
                </button>
                <button style={{ ...css.btn("ghost"), padding: "5px 8px" }} onClick={() => setShowBulkMove(false)}>
                  <Icon type="x" size={13} />
                </button>
              </div>
            ) : (
              <button style={{ ...css.btn("ghost"), padding: "5px 12px" }} onClick={() => setShowBulkMove(true)}>
                <Icon type="tag" size={13} /> Preisliste zuordnen
              </button>
            )
          )}
          {confirmDelete ? (
            <div style={{ display: "flex", gap: 6, alignItems: "center", padding: "4px 10px", background: theme.redGlow, borderRadius: theme.radiusSm, border: `1px solid ${theme.red}33` }}>
              <span style={{ fontSize: 12, color: theme.red, fontWeight: 500 }}>{selected.size} in Papierkorb verschieben?</span>
              <button style={{ ...css.btn("danger"), padding: "4px 12px", fontSize: 12 }} onClick={bulkDelete}>
                <Icon type="check" size={13} /> Ja, löschen
              </button>
              <button style={{ ...css.btn("ghost"), padding: "4px 8px", fontSize: 12 }} onClick={() => setConfirmDelete(false)}>
                Abbrechen
              </button>
            </div>
          ) : (
            <button style={{ ...css.btn("ghost"), padding: "5px 12px", color: theme.red, borderColor: theme.red + "33" }} onClick={() => setConfirmDelete(true)}>
              <Icon type="trash" size={13} /> In Papierkorb ({selected.size})
            </button>
          )}
          <button style={{ ...css.btn("ghost"), padding: "5px 8px" }} onClick={() => setSelected(new Set())}>
            <Icon type="x" size={13} /> Auswahl aufheben
          </button>
        </div>
      )}

      {/* Toolbar */}
      <div style={{ display: "flex", gap: 10, marginBottom: 12, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ position: "relative", flex: 1, minWidth: 200 }}>
          <input
            style={css.input}
            placeholder="Produkte durchsuchen..."
            value={search}
            onChange={(e) => setSearch(e.target.value)}
          />
          <span style={{ position: "absolute", right: 10, top: 8, color: theme.textDim }}>
            <Icon type="search" size={16} />
          </span>
        </div>
        <button style={css.btn("primary")} onClick={() => { resetForm(); setShowForm(true); }}>
          <Icon type="plus" size={15} /> Produkt
        </button>
        <button style={css.btn("ghost")} onClick={() => setShowImport(!showImport)}>
          <Icon type="upload" size={15} /> Import
        </button>
        {products.length > 0 && (
          <button style={css.btn("ghost")} onClick={exportCSV}>
            <Icon type="download" size={15} /> Export
          </button>
        )}
      </div>

      {/* Filter Row */}
      <div style={{ display: "flex", gap: 10, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
        {suppliers.length > 0 && (
          <select
            style={{ ...css.select, width: "auto", minWidth: 150, padding: "6px 10px", fontSize: 12 }}
            value={filterSupplier}
            onChange={(e) => setFilterSupplier(e.target.value)}
          >
            <option value="">Alle Preislisten</option>
            {suppliers.map((s) => (
              <option key={s.id} value={s.id}>{s.name} ({products.filter((p) => p.supplierId === s.id).length})</option>
            ))}
            <option value="__none__">Ohne Zuordnung ({products.filter((p) => !p.supplierId).length})</option>
          </select>
        )}
        {categories.length > 0 && (
          <select
            style={{ ...css.select, width: "auto", minWidth: 140, padding: "6px 10px", fontSize: 12 }}
            value={filterCategory}
            onChange={(e) => setFilterCategory(e.target.value)}
          >
            <option value="">Alle Kategorien</option>
            {categories.map((c) => (
              <option key={c} value={c}>{c} ({products.filter((p) => p.category === c).length})</option>
            ))}
          </select>
        )}
        {(filterSupplier || filterCategory || search) && (
          <button
            style={{ ...css.btn("ghost"), padding: "5px 10px", fontSize: 12 }}
            onClick={() => { setFilterSupplier(""); setFilterCategory(""); setSearch(""); }}
          >
            <Icon type="x" size={13} /> Filter zurücksetzen
          </button>
        )}
        <div style={{ flex: 1 }} />
        <div style={{ fontSize: 12, color: theme.textMuted }}>
          {filtered.length} von {products.length} Produkte
        </div>
      </div>

      {/* CSV Import */}
      {showImport && (
        <div style={css.card}>
          <div style={css.cardTitle}><Icon type="upload" size={16} /> Preisliste importieren</div>
          
          {/* Supplier Selection */}
          <div style={{ marginBottom: 14, padding: "12px 14px", background: theme.surface, borderRadius: theme.radiusSm, border: `1px solid ${theme.border}` }}>
            <Field label="Welcher Preisliste zuordnen?">
              <div style={{ display: "flex", gap: 8 }}>
                <select
                  style={{ ...css.select, flex: 1 }}
                  value={importSupplierId}
                  onChange={(e) => {
                    setImportSupplierId(e.target.value);
                    // Auto-set price type from supplier defaults
                    const sup = suppliers.find((s) => s.id === e.target.value);
                    if (sup) {
                      setImportPriceType(sup.defaultPriceType || "netto");
                      setImportMwst(sup.defaultMwst || "19");
                    }
                  }}
                >
                  <option value="">— Keine Zuordnung —</option>
                  {suppliers.map((s) => (
                    <option key={s.id} value={s.id}>{s.name}</option>
                  ))}
                  <option value="__new__">+ Neue Preisliste erstellen...</option>
                </select>
              </div>
            </Field>
            {importSupplierId === "__new__" && (
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                <input
                  id="newSupplierInput"
                  style={{ ...css.input, flex: 1 }}
                  placeholder="Name der neuen Preisliste (z.B. Rausch, Bünting)..."
                  autoFocus
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && e.target.value.trim()) {
                      const colors = ["#E53238", "#3B82F6", "#22C55E", "#EAB308", "#A855F7", "#F97316", "#EC4899", "#06B6D4"];
                      const newSupplier = { id: uid(), name: e.target.value.trim(), color: colors[suppliers.length % colors.length], notes: "" };
                      setSuppliers([...suppliers, newSupplier]);
                      setImportSupplierId(newSupplier.id);
                    }
                  }}
                />
                <button
                  style={css.btn("primary")}
                  onClick={() => {
                    const input = document.getElementById("newSupplierInput");
                    if (input?.value?.trim()) {
                      const colors = ["#E53238", "#3B82F6", "#22C55E", "#EAB308", "#A855F7", "#F97316", "#EC4899", "#06B6D4"];
                      const newSupplier = { id: uid(), name: input.value.trim(), color: colors[suppliers.length % colors.length], notes: "" };
                      setSuppliers([...suppliers, newSupplier]);
                      setImportSupplierId(newSupplier.id);
                    }
                  }}
                >
                  <Icon type="check" size={14} /> Erstellen
                </button>
              </div>
            )}
          </div>
          
          {/* Price Type Selection */}
          <div style={{ marginBottom: 14, padding: "12px 14px", background: theme.surface, borderRadius: theme.radiusSm, border: `1px solid ${theme.border}` }}>
            <div style={{ display: "flex", gap: 16, alignItems: "end", flexWrap: "wrap" }}>
              <Field label="Preise in der Datei sind...">
                <div style={{ display: "flex", borderRadius: theme.radiusSm, overflow: "hidden", border: `1px solid ${theme.border}` }}>
                  {["netto", "brutto"].map((pt) => (
                    <button
                      key={pt}
                      style={{
                        padding: "8px 18px", fontSize: 13, fontWeight: 600, border: "none", cursor: "pointer",
                        fontFamily: theme.font,
                        background: importPriceType === pt ? (pt === "netto" ? theme.green : theme.yellow) : theme.surface,
                        color: importPriceType === pt ? "#fff" : theme.textMuted,
                        transition: "all 0.15s",
                      }}
                      onClick={() => setImportPriceType(pt)}
                    >
                      {pt === "netto" ? "Netto (exkl. MwSt)" : "Brutto (inkl. MwSt)"}
                    </button>
                  ))}
                </div>
              </Field>
              {importPriceType === "brutto" && (
                <Field label="MwSt-Satz für Umrechnung">
                  <select style={css.select} value={importMwst} onChange={(e) => setImportMwst(e.target.value)}>
                    {MWST_RATES.map((r) => (
                      <option key={r.id} value={r.id}>{r.label}</option>
                    ))}
                  </select>
                </Field>
              )}
              <div style={{ fontSize: 12, color: importPriceType === "netto" ? theme.green : theme.yellow, fontWeight: 500, paddingBottom: 8 }}>
                {importPriceType === "netto"
                  ? "✓ Preise werden direkt als Netto übernommen"
                  : `→ Brutto wird automatisch in Netto umgerechnet (÷ ${(1 + (MWST_RATES.find((r) => r.id === importMwst)?.rate || 19) / 100).toFixed(2)})`
                }
              </div>
            </div>
          </div>
          
          {/* File Upload Area */}
          <div
            style={{
              border: `2px dashed ${theme.border}`,
              borderRadius: theme.radius,
              padding: 24,
              textAlign: "center",
              marginBottom: 14,
              background: theme.surface,
              cursor: "pointer",
              transition: "border-color 0.2s",
            }}
            onClick={() => document.getElementById("csvFileInput").click()}
            onDragOver={(e) => { e.preventDefault(); e.currentTarget.style.borderColor = theme.accent; }}
            onDragLeave={(e) => { e.currentTarget.style.borderColor = theme.border; }}
            onDrop={(e) => {
              e.preventDefault();
              e.currentTarget.style.borderColor = theme.border;
              const file = e.dataTransfer.files[0];
              if (file) {
                const fakeEvent = { target: { files: [file], value: "" } };
                handleFileUpload(fakeEvent);
              }
            }}
          >
            <div style={{ marginBottom: 8 }}><Icon type="upload" size={28} /></div>
            <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 4 }}>
              Excel oder CSV hier ablegen oder klicken zum Auswählen
            </div>
            <div style={{ fontSize: 12, color: theme.textMuted }}>
              Unterstützte Formate: .xlsx, .xls, .csv, .txt (Trennzeichen: Semikolon, Tab oder Komma)
            </div>
            <input
              id="csvFileInput"
              type="file"
              accept=".xlsx,.xls,.xlsm,.csv,.txt,.tsv"
              style={{ display: "none" }}
              onChange={handleFileUpload}
            />
          </div>
          
          {/* Or paste text */}
          <div style={{ fontSize: 12, color: theme.textMuted, marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ flex: 1, height: 1, background: theme.border }} />
            <span>oder Text einfügen</span>
            <div style={{ flex: 1, height: 1, background: theme.border }} />
          </div>
          <div style={{ fontSize: 12, color: theme.textMuted, marginBottom: 6 }}>
            Format: Name;EK-Preis;SKU;EAN;Kategorie;PZN
          </div>
          <textarea
            style={{ ...css.input, height: 100, resize: "vertical", fontFamily: theme.fontMono, fontSize: 12 }}
            placeholder={"Produkt A;12.50;SKU001;4012345678901;Haarpflege;18742239\nProdukt B;8.99;SKU002;;Hautpflege;12345678"}
            value={importText}
            onChange={(e) => handleTextChange(e.target.value)}
          />
          
          {/* Error */}
          {importError && (
            <div style={{ marginTop: 8, padding: "8px 12px", background: theme.redGlow, border: `1px solid ${theme.red}33`, borderRadius: theme.radiusSm, fontSize: 13, color: theme.red }}>
              {importError}
            </div>
          )}
          
          {/* Preview */}
          {importPreview.length > 0 && (
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8, color: theme.green, display: "flex", alignItems: "center", gap: 6 }}>
                <Icon type="check" size={15} /> {importPreview.length} Produkte erkannt
              </div>
              <div style={{ maxHeight: 200, overflow: "auto", border: `1px solid ${theme.border}`, borderRadius: theme.radiusSm }}>
                <table style={css.table}>
                  <thead>
                    <tr>
                      <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>Name</th>
                      <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card, textAlign: "right" }}>
                        {importPriceType === "brutto" ? "Brutto" : "Netto"}
                      </th>
                      {importPriceType === "brutto" && (
                        <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card, textAlign: "right", color: theme.green }}>→ Netto</th>
                      )}
                      <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>SKU</th>
                      <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>PZN</th>
                      <th style={{ ...css.th, position: "sticky", top: 0, background: theme.card }}>Kategorie</th>
                    </tr>
                  </thead>
                  <tbody>
                    {importPreview.slice(0, 15).map((p, i) => (
                      <tr key={i}>
                        <td style={{ ...css.td, fontSize: 12 }}>{p.name}</td>
                        <td style={{ ...css.td, fontSize: 12, textAlign: "right", fontFamily: theme.fontMono }}>{fmt(p.ek)}</td>
                        {importPriceType === "brutto" && (
                          <td style={{ ...css.td, fontSize: 12, textAlign: "right", fontFamily: theme.fontMono, color: theme.green, fontWeight: 600 }}>
                            {fmt(bruttoToNetto(p.ek, MWST_RATES.find((r) => r.id === importMwst)?.rate || 19))}
                          </td>
                        )}
                        <td style={{ ...css.td, fontSize: 12, fontFamily: theme.fontMono, color: theme.textMuted }}>{p.sku || "–"}</td>
                        <td style={{ ...css.td, fontSize: 12, fontFamily: theme.fontMono, color: theme.textMuted }}>{p.pzn || "–"}</td>
                        <td style={{ ...css.td, fontSize: 12 }}>{p.category || "–"}</td>
                      </tr>
                    ))}
                    {importPreview.length > 15 && (
                      <tr>
                        <td colSpan={importPriceType === "brutto" ? 6 : 5} style={{ ...css.td, fontSize: 12, color: theme.textMuted, textAlign: "center" }}>
                          ... und {importPreview.length - 15} weitere Produkte
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}
          
          <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
            <button
              style={{ ...css.btn("primary"), opacity: importPreview.length > 0 ? 1 : 0.5 }}
              onClick={importCSV}
              disabled={importPreview.length === 0}
            >
              <Icon type="check" size={15} /> {importPreview.length > 0 ? `${importPreview.length} Produkte importieren` : "Importieren"}
            </button>
            <button style={css.btn("ghost")} onClick={() => { setShowImport(false); setImportText(""); setImportPreview([]); setImportError(""); }}>Abbrechen</button>
          </div>
        </div>
      )}

      {/* Add/Edit Form */}
      {showForm && (
        <div style={css.card}>
          <div style={css.cardTitle}>{editId ? "Produkt bearbeiten" : "Neues Produkt"}</div>
          {/* Row 1: Name, Preisliste, Kategorie */}
          <div style={css.grid3}>
            <Field label="Produktname *">
              <input style={css.input} value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="z.B. Pflege-Shampoo 200ml" />
            </Field>
            <Field label="Preisliste">
              <select style={css.select} value={form.supplierId} onChange={(e) => setForm({ ...form, supplierId: e.target.value })}>
                <option value="">— Keine —</option>
                {suppliers.map((s) => (
                  <option key={s.id} value={s.id}>{s.name}</option>
                ))}
              </select>
            </Field>
            <Field label="Kategorie">
              <input style={css.input} value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })} placeholder="z.B. Haarpflege"
                list="categories" />
              <datalist id="categories">
                {categories.map((c) => <option key={c} value={c} />)}
              </datalist>
            </Field>
          </div>
          {/* Row 2: EK-Preis mit Netto/Brutto Toggle und MwSt */}
          <div style={{ display: "grid", gridTemplateColumns: "auto 1fr auto auto", gap: 12, marginTop: 12, alignItems: "end" }}>
            <Field label="Preisart">
              <div style={{ display: "flex", borderRadius: theme.radiusSm, overflow: "hidden", border: `1px solid ${theme.border}` }}>
                {["netto", "brutto"].map((pt) => (
                  <button
                    key={pt}
                    style={{
                      padding: "8px 14px", fontSize: 12, fontWeight: 600, border: "none", cursor: "pointer",
                      fontFamily: theme.font,
                      background: form.priceType === pt ? theme.accent : theme.surface,
                      color: form.priceType === pt ? "#fff" : theme.textMuted,
                      transition: "all 0.15s",
                    }}
                    onClick={() => setForm({ ...form, priceType: pt })}
                  >
                    {pt === "netto" ? "Netto" : "Brutto"}
                  </button>
                ))}
              </div>
            </Field>
            <Field label={`EK-Preis (${form.priceType === "netto" ? "Netto" : "Brutto inkl. MwSt"}) *`}>

            </Field>
            {form.priceType === "brutto" && (
              <Field label="MwSt-Satz">
                <select style={css.select} value={form.mwst} onChange={(e) => setForm({ ...form, mwst: e.target.value })}>
                  {MWST_RATES.map((r) => (
                    <option key={r.id} value={r.id}>{r.label}</option>
                  ))}
                </select>
              </Field>
            )}
            {form.ek && parseFloat(form.ek) > 0 && (
              <div style={{
                padding: "8px 14px", background: theme.greenGlow, border: `1px solid ${theme.green}33`,
                borderRadius: theme.radiusSm, textAlign: "center", minWidth: 100,
              }}>
                <div style={{ fontSize: 11, color: theme.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>
